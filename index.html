<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upcoming Student Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ Correct PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}

h1 {
  text-align:center;
  margin-bottom:16px;
}

/* ===== SEARCH BAR ===== */
.toolbar {
  max-width:1200px;
  margin:0 auto 20px;
  display:grid;
  grid-template-columns: 2fr 1fr 1.2fr 1.2fr auto;
  gap:10px;
}

.toolbar input,
.toolbar select,
.toolbar button {
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #d0d0d0;
  font-size:14px;
}

.toolbar button {
  background:#111827;
  color:white;
  cursor:pointer;
}

@media (max-width: 900px) {
  .toolbar { grid-template-columns:1fr 1fr; }
  .toolbar button { grid-column: span 2; }
}

/* ===== GRID ===== */
.events-container {
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap:18px;
}

/* ===== CARD ===== */
.event-card {
  border-radius:16px;
  box-shadow:0 6px 14px rgba(0,0,0,0.12);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER STRIP (decorative) ===== */
.card-header {
  height:56px;
  background:rgba(0,0,0,0.05);
}

/* ===== BODY ===== */
.card-body {
  padding:14px 16px 16px;
  flex:1;
}

/* ===== DATE BADGE ===== */
.date-badge {
  width:52px;
  height:52px;
  border-radius:10px;
  background:#111827;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  margin-top:-36px;
}

.date-badge .day {
  font-size:18px;
  line-height:18px;
}

.date-badge .month {
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.event-title {
  font-size:16px;
  font-weight:bold;
  margin:10px 0 6px;
}

.event-meta {
  font-size:14px;
  margin:3px 0;
  color:#333;
}

.category {
  margin-top:10px;
  display:inline-block;
  font-size:12px;
  background:rgba(0,0,0,0.1);
  padding:4px 10px;
  border-radius:20px;
}

/* ===== EMPTY ===== */
.empty {
  text-align:center;
  margin-top:30px;
  font-size:15px;
  color:#444;
}
</style>
</head>

<body>

<h1>Upcoming Student Events</h1>

<div class="toolbar">
  <input id="q" placeholder="🔍 Search by event, club, category, venue…" />
  <input id="dateFilter" type="date" />
  <select id="clubFilter"></select>
  <select id="catFilter"></select>
  <button id="clearBtn">Clear</button>
</div>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;"></div>

<script>
const csvUrl = "website-data.csv";
const today = new Date(); today.setHours(0,0,0,0);

/* ✅ Inclusive pastel palette */
const CARD_COLORS = [
  "#F0F7FF",
  "#F7F3FF",
  "#FFF6EC",
  "#F1FAF5",
  "#FFF0F3",
  "#F5F5F5"
];

const excelToDate = n => {
  const d = new Date((Number(n)-25569)*86400000);
  d.setHours(0,0,0,0);
  return d;
};

function render(){
  const qv = q.value.toLowerCase();
  const cv = clubFilter.value;
  const tv = catFilter.value;
  const dv = dateFilter.value ? new Date(dateFilter.value+"T00:00:00") : null;

  const filtered = allEvents
    .filter(e => e.date >= today)
    .filter(e => !cv || e.organiser===cv)
    .filter(e => !tv || e.category===tv)
    .filter(e => !dv || e.date.getTime()===dv.getTime())
    .filter(e => !qv || `${e.name} ${e.organiser} ${e.category} ${e.venue}`.toLowerCase().includes(qv))
    .sort((a,b)=>a.date-b.date);

  events.innerHTML="";
  emptyMsg.style.display="none";

  if(!filtered.length){
    emptyMsg.style.display="block";
    emptyMsg.innerHTML = cv
      ? "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)"
      : tv
      ? "💡 Don't see any relevant event? How about you bring the event and OSEP would love to support you in planning and execution of the event."
      : "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)";
    return;
  }

  filtered.forEach((e,i)=>{
    const day = String(e.date.getDate()).padStart(2,"0");
    const month = e.date.toLocaleString("en-US",{month:"short"});

    const cardColor = CARD_COLORS[i % CARD_COLORS.length];

    const orgHTML   = e.organiser ? `<div class="event-meta">🎭 ${e.organiser}</div>` : "";
    const venueHTML= e.venue ? `<div class="event-meta">📍 ${e.venue}</div>` : "";
    const timeHTML = e.time ? `<div class="event-meta">⏰ ${e.time}</div>` : "";

    events.insertAdjacentHTML("beforeend",`
      <div class="event-card" style="background:${cardColor}">
        <div class="card-header"></div>
        <div class="card-body">
          <div class="date-badge">
            <div class="day">${day}</div>
            <div class="month">${month}</div>
          </div>
          <div class="event-title">${e.name}</div>
          ${orgHTML}
          ${venueHTML}
          ${timeHTML}
          <div class="category">${e.category}</div>
        </div>
      </div>
    `);
  });
}

let allEvents = [];

Papa.parse(csvUrl,{
  download:true,header:true,skipEmptyLines:true,
  complete:r=>{
    allEvents = r.data.map(x=>({
      name:x["Event Name"],
      organiser:x["Organiser"],
      category:x["Category of the Event"],
      venue:x["Venue"]||"",
      time:x["Start Time"]||"",
      date:excelToDate(x["Date of the Event"])
    })).filter(e=>e.name && e.date);

    clubFilter.innerHTML = `<option value="">🎭 Choose a club or society</option>` +
      [...new Set(allEvents.map(e=>e.organiser))].sort().map(c=>`<option>${c}</option>`).join("");

    catFilter.innerHTML = `<option value="">🎯 Choose an activity type</option>` +
      [...new Set(allEvents.map(e=>e.category))].sort().map(c=>`<option>${c}</option>`).join("");

    q.oninput=dateFilter.onchange=clubFilter.onchange=catFilter.onchange=render;
    clearBtn.onclick=()=>{q.value=dateFilter.value=clubFilter.value=catFilter.value="";render();};

    render();
  }
});

const q=document.getElementById("q"),
      dateFilter=document.getElementById("dateFilter"),
      clubFilter=document.getElementById("clubFilter"),
      catFilter=document.getElementById("catFilter"),
      clearBtn=document.getElementById("clearBtn"),
      events=document.getElementById("events"),
      emptyMsg=document.getElementById("emptyMsg");
</script>

</body>
</html>
