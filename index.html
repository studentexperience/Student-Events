<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Life · Events</title>

  <!-- Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --bg:#f3f4f6;
      --panel:#ffffff;
      --shadow:0 6px 14px rgba(0,0,0,.10);

      /* inclusive pastel palette */
      --b1:#F0F7FF; --a1:#D6E6FF;
      --b2:#F7F3FF; --a2:#E3DBFF;
      --b3:#FFF6EC; --a3:#FFE6CC;
      --b4:#F1FAF5; --a4:#D9F2E6;
      --b5:#FFF0F3; --a5:#FFD6DE;
      --b6:#F5F5F5; --a6:#E1E1E1;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    /* ===== Top header ===== */
    .topbar{
      height:56px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      padding:0 18px;
      gap:12px;
    }
    .brand{
      font-weight:600;
      letter-spacing:.2px;
    }

    /* ===== Main layout: left nav + content ===== */
    .shell{
      display:grid;
      grid-template-columns: 180px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* Left navigation */
    .nav{
      background:var(--panel);
      border-right:1px solid var(--border);
      padding:14px 10px;
    }
    .nav a{
      display:block;
      padding:10px 12px;
      margin:4px 0;
      border-radius:10px;
      color:#111;
      text-decoration:none;
      font-size:14px;
    }
    .nav a:hover{ background:#f3f4f6; }
    .nav a.active{
      background:#eef2ff;
      color:#1f2a64;
      font-weight:600;
    }

    /* Content area */
    .content{
      padding:22px;
    }

    .page-title{
      font-size:28px;
      font-weight:700;
      margin:6px 0 18px;
    }

    /* ===== Two-column content: filters + cards ===== */
    .page-grid{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:18px;
      align-items:start;
    }

    /* Filter panel */
    .filters{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow: var(--shadow);
      padding:16px;
      position:sticky;
      top:16px;
    }

    .filter-title{
      font-size:14px;
      font-weight:600;
      margin:2px 0 14px;
      color:#111;
    }

    .field{
      margin:0 0 14px;
    }
    .field label{
      display:block;
      font-size:13px;
      color:#111;
      font-weight:600;
      margin-bottom:6px;
    }
    .field input,
    .field select{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #d1d5db;
      font-family:'Poppins',sans-serif;
      font-size:14px;
      background:#fff;
    }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:4px;
    }
    .btn{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--ink);
      background:var(--ink);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-family:'Poppins',sans-serif;
      font-size:14px;
    }
    .btn.secondary{
      background:#fff;
      color:var(--ink);
      border:1px solid #d1d5db;
      font-weight:600;
    }

    /* Toggle (Upcoming / Past) */
    .toggle{
      display:flex;
      gap:10px;
      margin:6px 0 14px;
    }
    .pill{
      flex:1;
      border:none;
      border-radius:999px;
      padding:8px 10px;
      cursor:pointer;
      background:#e5e7eb;
      font-family:'Poppins',sans-serif;
      font-weight:600;
      font-size:13px;
    }
    .pill.active{
      background:var(--ink);
      color:#fff;
    }

    /* =============================================
       CARDS GRID
       Desktop (≥1280px): 4 columns
       Laptop  (≥1024px): 3 columns
       Tablet  (≥640px) : 2 columns
       Mobile  (<640px) : 1 column
    ============================================= */
    .cards{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:18px;
    }

    .empty{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      color:#444;
      box-shadow: var(--shadow);
      font-size:14px;
    }

    /* =============================================
       CARD LAYOUT (redesigned)
       Structure:
         .cover-img   – image placeholder at top
         .body        – content (padded, 1.2× taller)
           .title     – bold event name
           .spacer    – two line-spaces gap
           .meta      – date, time, venue
         .organizer-banner – sticky bottom strip
    ============================================= */
    .card{
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      background:var(--panel);
    }

    /* Cover image area */
    .cover-img{
      width:100%;
      /* 1.2× height factor applied here too: base ~160px × 1.2 = ~192px */
      height:192px;
      object-fit:cover;
      display:block;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      flex-shrink:0;
    }

    /* Placeholder shown when no image URL is available */
    .cover-placeholder{
      width:100%;
      height:192px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      opacity:0.55;
    }

    /* Body: 1.2× padding (original ~12px 14px 14px → ~14px 17px 17px) */
    .body{
      padding:14px 17px 17px;
      flex:1;
      display:flex;
      flex-direction:column;
    }

    /* Bold event name */
    .title{
      font-size:15.5px;
      font-weight:700;
      margin:0 0 0;
      line-height:1.35;
    }

    /* Two line-spaces gap between title and meta */
    .title-gap{
      height:2em; /* two line-space equivalent */
    }

    /* Date / time / venue lines */
    .meta{
      font-size:13.5px;
      margin:3px 0;
      line-height:1.35;
      color:#333;
      display:flex;
      align-items:flex-start;
      gap:5px;
    }
    .meta-icon{
      flex-shrink:0;
      margin-top:1px;
    }

    /* Category chip (kept for reference, hidden in new layout — remove if unwanted) */
    .chip{
      margin-top:10px;
      font-size:11.5px;
      background:rgba(0,0,0,.07);
      padding:3px 10px;
      border-radius:999px;
      align-self:flex-start;
      font-weight:500;
    }

    /* =============================================
       ORGANIZER BANNER — bottom of card
    ============================================= */
    .organizer-banner{
      padding:9px 17px;
      font-size:12px;
      font-weight:600;
      letter-spacing:.2px;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex-shrink:0;
      text-decoration:none;
      display:block;
      transition: filter .15s;
    }
    .organizer-banner:hover{
      filter: brightness(1.15);
      cursor: pointer;
    }
    .organizer-banner::after{
      content: " →";
      opacity: 0;
      transition: opacity .15s;
    }
    .organizer-banner:hover::after{
      opacity: 1;
    }

    /* Campus tag on card */
    .campus-tag{
      display:inline-flex;
      align-items:center;
      gap:4px;
      font-size:11px;
      font-weight:600;
      padding:3px 9px;
      border-radius:999px;
      margin-top:8px;
      align-self:flex-start;
    }
    .campus-tag.karachi    { background:#eff6ff; color:#1d4ed8; }
    .campus-tag.nairobi    { background:#f0fdf4; color:#15803d; }
    .campus-tag.kampala    { background:#fffbeb; color:#b45309; }
    .campus-tag.dares      { background:#fdf4ff; color:#7e22ce; }
    .campus-tag.default    { background:#f3f4f6; color:#374151; }

    /* Interested button */
    .interested-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed rgba(0,0,0,.1);
    }
    .interested-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid rgba(0,0,0,.12);
      background: white;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all .18s ease;
    }
    .interested-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239,68,68,.15);
    }
    .interested-btn.active {
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(239,68,68,.3);
    }
    .interested-btn.active:hover {
      transform: translateY(-1px) scale(1.02);
    }
    .interested-btn .heart-icon {
      font-size: 14px;
      transition: transform .25s ease;
    }
    .interested-btn:hover .heart-icon,
    .interested-btn.active .heart-icon {
      transform: scale(1.25);
    }
    .interested-count {
      font-variant-numeric: tabular-nums;
    }
    /* Pulse animation when clicked */
    @keyframes heart-pulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .interested-btn.pulse .heart-icon {
      animation: heart-pulse .5s ease;
    }
    .nav-toggle{
      display:none;
      background:none;
      border:none;
      cursor:pointer;
      padding:4px 6px;
      font-size:22px;
      line-height:1;
      color:var(--ink);
    }

    /* Mobile filter toggle button */
    .filter-toggle{
      display:none;
      width:100%;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--panel);
      font-family:'Poppins',sans-serif;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      text-align:left;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    /* =============================================
       RESPONSIVE BREAKPOINTS
       1280px+ : 4 cards  (large desktop)
       1024px  : 3 cards  (laptop / small desktop)
        768px  : 2 cards  (tablet landscape + portrait)
        480px  : 1 card   (phone)
    ============================================= */

    /* Laptop / small desktop */
    @media (max-width: 1280px){
      .cards{ grid-template-columns: repeat(3, 1fr); }
    }

    /* Tablet landscape — side nav collapses into topbar */
    @media (max-width: 1024px){
      .shell{ grid-template-columns: 1fr; }
      .nav{
        display:none;
        position:fixed;
        top:56px; left:0;
        width:200px;
        height:calc(100vh - 56px);
        z-index:200;
        box-shadow:4px 0 16px rgba(0,0,0,.12);
        overflow-y:auto;
      }
      .nav.open{ display:block; }
      .nav-toggle{ display:block; }
      .content{ padding:18px; }
      .page-grid{ grid-template-columns: 260px 1fr; }
      .cards{ grid-template-columns: repeat(2, 1fr); }
    }

    /* Tablet portrait */
    @media (max-width: 860px){
      .page-grid{ grid-template-columns: 1fr; }
      .filters{
        position:relative;
        top:auto;
      }
      /* Filter panel collapsible on tablet/mobile */
      .filter-toggle{ display:block; }
      .filters-inner{ display:none; }
      .filters-inner.open{ display:block; }
      .cards{ grid-template-columns: repeat(2, 1fr); }
    }

    /* Phone */
    @media (max-width: 540px){
      .content{ padding:12px; }
      .page-title{ font-size:22px; margin-bottom:12px; }
      .cards{
        grid-template-columns: 1fr;
        gap:14px;
      }
      .cover-img,
      .cover-placeholder{ height:160px; }
      .organizer-banner{ font-size:11.5px; padding:8px 14px; }
    }

    /* Add to Calendar button */
    .add-to-cal-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: #f0fdf4;
      color: #16a34a;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all .15s;
      white-space: nowrap;
      text-decoration: none;
    }
    .add-to-cal-btn:hover {
      background: #16a34a;
      color: white;
      border-color: #16a34a;
    }

    /* Calendar detail add-to-cal row */
    .cal-detail-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* ── CALENDAR VIEW ── */
    .view-switch {
      display: inline-flex;
      gap: 6px;
      background: white;
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .view-switch button {
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .18s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .view-switch button:hover { color: #2563eb; }
    .view-switch button.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 3px 10px rgba(37,99,235,.3);
    }

    /* Calendar container */
    .calendar-wrap {
      background: white;
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: none;
    }
    .calendar-wrap.visible { display: block; }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-wrap: wrap;
    }
    .cal-nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .cal-nav-btn:hover { border-color: #2563eb; color: #2563eb; }
    .cal-month-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      flex: 1;
      text-align: center;
      min-width: 140px;
    }
    .cal-today-btn {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid #2563eb;
      background: white;
      color: #2563eb;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .cal-today-btn:hover { background: #2563eb; color: white; }

    /* Days-of-week row */
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
      background: #f9fafb;
    }
    .cal-weekday {
      text-align: center;
      padding: 10px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* Day cells grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-day {
      min-height: 100px;
      padding: 8px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: background .15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day:hover:not(.empty):not(.no-events) { background: #f8fafc; }
    .cal-day.empty { background: #fafafa; cursor: default; }
    .cal-day.no-events { cursor: default; }
    .cal-day.today { background: #eff6ff; }
    .cal-day.today .cal-day-num { color: #2563eb; }
    .cal-day.selected { background: #2563eb !important; }
    .cal-day.selected .cal-day-num,
    .cal-day.selected .cal-event-pill { color: white; }
    .cal-day.has-events { background: #fefce8; }

    .cal-day-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }
    .cal-day.empty .cal-day-num { color: #d1d5db; }

    .cal-event-pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.4;
    }
    .cal-event-more {
      font-size: 9px;
      color: var(--muted);
      font-weight: 600;
      padding: 0 4px;
    }
    .cal-event-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 2px;
    }
    .cal-day-dots {
      display: none;
    }

    /* Day detail panel */
    .cal-detail {
      padding: 20px 24px;
      border-top: 2px solid #2563eb;
      background: linear-gradient(180deg, #eff6ff 0%, white 100%);
      display: none;
    }
    .cal-detail.visible { display: block; }
    .cal-detail-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cal-detail-empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }
    .cal-detail-events {
      display: grid;
      gap: 10px;
    }
    .cal-detail-event {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all .15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .cal-detail-event:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
      border-color: #2563eb;
    }
    .cal-detail-color {
      width: 4px;
      align-self: stretch;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .cal-detail-body { flex: 1; min-width: 0; }
    .cal-detail-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .cal-detail-meta {
      font-size: 11.5px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .cal-detail-meta span { display: inline-flex; align-items: center; gap: 3px; }

    /* Responsive — tablet */
    @media (max-width: 860px) {
      .cal-day { min-height: 75px; padding: 5px; }
      .cal-event-pill { font-size: 9px; padding: 1px 4px; }
      .cal-month-label { font-size: 16px; }
    }

    /* Responsive — mobile (show dots instead of pills) */
    @media (max-width: 560px) {
      .calendar-header { padding: 14px 12px; }
      .cal-day {
        min-height: 56px;
        padding: 4px 3px;
      }
      .cal-event-pill {
        display: none; /* hide text pills on mobile */
      }
      .cal-day-dots {
        display: flex;
        gap: 2px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 2px;
      }
      .cal-day-num { font-size: 12px; }
      .cal-weekday { font-size: 9px; padding: 8px 2px; }
      .cal-month-label { font-size: 15px; }
      .cal-nav-btn { width: 32px; height: 32px; font-size: 14px; }
      .cal-today-btn { padding: 6px 12px; font-size: 11px; }
    }

    /* Mobile day detail modal */
    .cal-mobile-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      align-items: flex-end;
      justify-content: center;
    }
    .cal-mobile-modal.open { display: flex; }
    .cal-mobile-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.45);
    }
    .cal-mobile-sheet {
      position: relative;
      background: white;
      width: 100%;
      max-height: 80vh;
      border-radius: 20px 20px 0 0;
      overflow-y: auto;
      padding: 0 0 32px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .cal-mobile-handle {
      width: 40px; height: 4px;
      background: #d1d5db;
      border-radius: 999px;
      margin: 12px auto 16px;
    }
    .cal-mobile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .cal-mobile-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }
    .cal-mobile-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: #f3f4f6;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ---- Nav & filter toggles ---- */
  const navToggle    = document.getElementById("navToggle");
  const nav          = document.querySelector(".nav");
  const filterToggle = document.getElementById("filterToggle");
  const filtersInner = document.getElementById("filtersInner");

  navToggle.addEventListener("click", () => nav.classList.toggle("open"));

  document.addEventListener("click", (e) => {
    if(nav.classList.contains("open") &&
       !nav.contains(e.target) && e.target !== navToggle){
      nav.classList.remove("open");
    }
  });

  filterToggle.addEventListener("click", () => {
    const isOpen = filtersInner.classList.toggle("open");
    filterToggle.textContent = isOpen ? "🔍 Search & Filter ▴" : "🔍 Search & Filter ▾";
  });

  const mq = window.matchMedia("(max-width: 860px)");
  if(!mq.matches){ filtersInner.classList.add("open"); }
  mq.addEventListener("change", (e) => {
    if(!e.matches) filtersInner.classList.add("open");
  });

  /* ---- CSV / events logic ---- */

  const today = new Date();
  today.setHours(0,0,0,0);

  let mode = "upcoming";
  let allEvents = [];

  const PALETTE = [
    {base:getCss('--b1'), accent:getCss('--a1')},
    {base:getCss('--b2'), accent:getCss('--a2')},
    {base:getCss('--b3'), accent:getCss('--a3')},
    {base:getCss('--b4'), accent:getCss('--a4')},
    {base:getCss('--b5'), accent:getCss('--a5')},
    {base:getCss('--b6'), accent:getCss('--a6')},
  ];

  // Accent colours used for the organizer banner background
  const BANNER_COLORS = [
    '#4f7cff','#7c5cbf','#e07b39','#2a9d6f','#c94f6a','#555555'
  ];

  const ALL_CLUBS = [
    "ACC MC - Undergraduate","ACC SONAM - Graduate","ACC SONAM - Undergraduate","ACCs FAS","Activity Club IED",
    "AKU Athletics Club","AKU Chess Club","AKU Graduate Education Student Society (AGESS)","AKU Journalism Club",
    "AKU Majlis","AKU MUN","AKU Photography Club","Arts and Culture Committee (AAC) (AKU-FAS)",
    "Arts and Culture Committee (AAC) (AKU-IED)","Arts and Culture Committee (AAC) (AKU-SONAM) Graduate",
    "Arts and Culture Committee (AAC) (AKU-SONAM) Undergraduate","Arts and Culture Committee (ACC) (AKU-MC)",
    "Aurora","Class Representative","Club for Theatrics (ACT)","Entrepreneurial Society (AES)","Explorers Club",
    "FALAH (FAS)","FALAH (MBBS)","FALAH (SONAM)","Music Society","OSEP Internal","Public Speaking Forum (PSF)",
    "Publication and Literary Society (APLS) (FAS)","Publication and Literary Society (APLS) (MBBS)",
    "Publication and Literary Society (APLS) (SONAM)","Rowing Club (ARC)","Society for Arts and Culture",
    "Society of Climate Conservation and Health (SoCCH)","Sports Society","Student Research Forum (SRF) (FAS)",
    "Student Research Forum (SRF) (MBBS)","Student Research Forum (SRF) (SONAM)","SRF-FAS Conference",
    "Synergy (FAS)","Synergy (MBBS)","Synergy (SONAM)"
  ].slice().sort();

  const ALL_CATEGORIES = [
    "Recreational/Social","Sports","Competition","Workshop/Session",
    "Orientation","Meeting","Welfare","Other"
  ].slice().sort();

  // DOM refs
  const q           = document.getElementById("q");
  const dateFilter  = document.getElementById("dateFilter");
  const clubFilter  = document.getElementById("clubFilter");
  const catFilter   = document.getElementById("catFilter");
  const campusFilter= document.getElementById("campusFilter");
  const clearBtn    = document.getElementById("clearBtn");
  const eventsEl    = document.getElementById("events");
  const emptyMsg    = document.getElementById("emptyMsg");
  const upcomingBtn = document.getElementById("upcomingBtn");
  const pastBtn     = document.getElementById("pastBtn");

  function buildDropdown(el, placeholder, list){
    el.innerHTML = `<option value="">${placeholder}</option>` +
      list.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
  }

  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getCss(varName){
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }

  function sameDay(d1, d2){ return d1 && d2 && d1.getTime() === d2.getTime(); }

  // Format a JS Date as "Mon DD, YYYY"
  function formatDate(d){
    if(!d) return "";
    return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  }

  function render(){
    const qv  = q.value.trim().toLowerCase();
    const cv  = clubFilter.value;
    const tv  = catFilter.value;
    const cpv = campusFilter.value;
    const dv  = dateFilter.value ? new Date(dateFilter.value + "T00:00:00") : null;

    let list = allEvents.filter(e => mode === "upcoming" ? e.date >= today : e.date < today);

    list = list
      .filter(e => !cv  || e.organiser === cv)
      .filter(e => !tv  || e.category  === tv)
      .filter(e => !cpv || e.campus    === cpv)
      .filter(e => !dv  || sameDay(e.date, dv))
      .filter(e => !qv  || `${e.name} ${e.organiser} ${e.category} ${e.venue} ${e.time} ${e.campus}`.toLowerCase().includes(qv));

    list.sort((a,b) => mode === "upcoming" ? a.date - b.date : b.date - a.date);

    eventsEl.innerHTML = "";
    emptyMsg.style.display = "none";

    if(!list.length){
      emptyMsg.style.display = "block";
      if(cv){
        emptyMsg.textContent = "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)";
      } else if(tv){
        emptyMsg.textContent = "💡 Don't see any relevant event? How about you bring the event and OSEP would love to support you in planning and execution of the event.";
      } else if(cpv){
        emptyMsg.textContent = `📍 No ${mode === "upcoming" ? "upcoming" : "past"} events found for ${cpv} campus.`;
      } else {
        emptyMsg.textContent = mode === "upcoming" ? "No upcoming events to show." : "No past events to show.";
      }
      return;
    }

    list.forEach((e, i) => {
      const {base, accent} = PALETTE[i % PALETTE.length];
      const bannerColor    = BANNER_COLORS[i % BANNER_COLORS.length];
      // Meta lines
      const dateLine  = e.date  ? `<div class="meta"><span class="meta-icon">📅</span>${escapeHtml(formatDate(e.date))}</div>` : "";
      const timeLine  = e.time  ? `<div class="meta"><span class="meta-icon">⏰</span>${escapeHtml(e.time)}</div>` : "";
      const venueLine = e.venue ? `<div class="meta"><span class="meta-icon">📍</span>${escapeHtml(e.venue)}</div>` : "";
      const campusTag = e.campus ? `<div class="campus-tag ${campusClass(e.campus)}">🏫 ${escapeHtml(e.campus)}</div>` : "";
      const bannerHtml = e.organiser
        ? `<a class="organizer-banner" href="clubs.html?club=${encodeURIComponent(e.organiser)}" style="background:${bannerColor};" title="View ${escapeHtml(e.organiser)} on Clubs page">🎭 ${escapeHtml(e.organiser)}</a>`
        : "";

      // Interested counter — only show for upcoming events
      const isInterested = hasUserInterested(e.id);
      const interestedHtml = (mode === "upcoming" && e.id) ? `
        <div class="interested-row">
          <button class="interested-btn ${isInterested ? 'active' : ''}" 
                  data-event-id="${e.id}" 
                  onclick="toggleInterested(event, '${e.id}')"
                  title="${isInterested ? "You're interested!" : "Mark as interested"}">
            <span class="heart-icon">${isInterested ? '❤️' : '🤍'}</span>
            <span class="interested-count" id="count-${e.id}">${e.interested || 0}</span>
            <span>${e.interested === 1 ? 'person' : 'people'} interested</span>
          </button>
          ${e.id && e.date ? `<button class="add-to-cal-btn" onclick="downloadICS('${e.id}')" title="Add to your calendar">📆 Save</button>` : ""}
        </div>` : "";

      // Cover: real image → use it; missing → pick from curated student activity pool
      const coverHtml = e.image
        ? `<img class="cover-img" src="${escapeHtml(e.image)}" alt="${escapeHtml(e.name)}" loading="lazy" />`
        : `<img class="cover-img" src="${getActivityImage(e.category, i)}" alt="${escapeHtml(e.name)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${i + 10}/800/420'" />`;

      eventsEl.insertAdjacentHTML("beforeend", `
        <article class="card" style="background:${base}">
          ${coverHtml}
          <div class="body">
            <div class="title">${escapeHtml(e.name)}</div>
            <div class="title-gap"></div>
            ${dateLine}
            ${timeLine}
            ${venueLine}
            <div class="chip">${escapeHtml(e.category)}</div>
            ${campusTag}
            ${interestedHtml}
          </div>
          ${bannerHtml}
        </article>
      `);
    });
  }

  function campusClass(campus){
    const map = { "Karachi":"karachi", "Nairobi":"nairobi", "Kampala":"kampala", "Dar es Salaam":"dares" };
    return map[campus] || "default";
  }

  /* ── Interested counter ── */
  // Track which events this device has marked interested (localStorage)
  function getInterestedSet(){
    try { return new Set(JSON.parse(localStorage.getItem("interestedEvents") || "[]")); }
    catch { return new Set(); }
  }
  function saveInterestedSet(set){
    localStorage.setItem("interestedEvents", JSON.stringify([...set]));
  }
  function hasUserInterested(eventId){
    return getInterestedSet().has(eventId);
  }

  // Make toggle accessible from inline onclick
  window.toggleInterested = async function(evt, eventId){
    evt.stopPropagation();
    evt.preventDefault();

    const btn       = evt.currentTarget;
    const countEl   = document.getElementById(`count-${eventId}`);
    const heartEl   = btn.querySelector(".heart-icon");
    const labelEl   = btn.querySelector("span:last-child");
    const interested = getInterestedSet();
    const isAdding   = !interested.has(eventId);

    // Optimistic UI update — instant feedback
    btn.classList.add("pulse");
    setTimeout(() => btn.classList.remove("pulse"), 500);

    let currentCount = parseInt(countEl.textContent, 10) || 0;
    const newCount   = isAdding ? currentCount + 1 : Math.max(0, currentCount - 1);
    countEl.textContent = newCount;
    heartEl.textContent = isAdding ? "❤️" : "🤍";
    btn.classList.toggle("active", isAdding);
    labelEl.textContent = newCount === 1 ? "person interested" : "people interested";

    // Disable while saving to prevent rapid double-clicks
    btn.disabled = true;

    try {
      const fn = isAdding ? "increment_event_interest" : "decrement_event_interest";
      const { data, error } = await sb.rpc(fn, { event_id: eventId });
      if(error) throw error;

      // Sync local state
      if(isAdding) interested.add(eventId);
      else         interested.delete(eventId);
      saveInterestedSet(interested);

      // Sync count from server (handles concurrent users)
      if(typeof data === "number"){
        countEl.textContent = data;
        labelEl.textContent = data === 1 ? "person interested" : "people interested";
        // Update local cache
        const ev = allEvents.find(x => x.id === eventId);
        if(ev) ev.interested = data;
      }
    } catch(err){
      // Revert on failure
      countEl.textContent = currentCount;
      heartEl.textContent = isAdding ? "🤍" : "❤️";
      btn.classList.toggle("active", !isAdding);
      labelEl.textContent = currentCount === 1 ? "person interested" : "people interested";
      console.error("Failed to update interest:", err);
    } finally {
      btn.disabled = false;
    }
  };

  /* ------------------------------------------------------------------ */
  /*  Curated category-matched student activity photos                  */
  /*  All IDs are verified Picsum photos showing campus/student life     */
  /* ------------------------------------------------------------------ */

  const ACTIVITY_PHOTOS = {
    "Sports":              [1080, 1040, 416, 452, 485, 533, 618, 901],
    "Competition":         [256, 274, 291, 326, 366, 389, 430, 484],
    "Workshop/Session":    [159, 167, 177, 180, 204, 214, 221, 225],
    "Meeting":             [70,  92,  107, 119, 132, 141, 148, 153],
    "Orientation":         [1, 10, 20, 30, 40, 50, 60, 80],
    "Recreational/Social": [397, 399, 400, 403, 407, 409, 411, 413],
    "Welfare":             [247, 250, 251, 252, 253, 254, 255, 257],
    "Other":               [325, 330, 335, 340, 345, 350, 355, 360],
  };

  // Default pool used when category doesn't match or is missing
  const DEFAULT_PHOTOS    = [100, 110, 120, 130, 140, 150, 160, 170, 180, 190, 200, 210];

  function getActivityImage(category, index){
    const pool = ACTIVITY_PHOTOS[category] || DEFAULT_PHOTOS;
    const id   = pool[index % pool.length];
    return `https://picsum.photos/id/${id}/800/420`;
  }

  /* ---- Supabase init ---- */
  const SUPABASE_URL = "https://dgzuqvffnbfybngoadse.supabase.co";
  const SUPABASE_KEY = "sb_publishable_77t5gCD7M620CzcMwESN-A_oAuqz6B8";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ---- Load events from Supabase ---- */
  async function loadEvents(){
    eventsEl.innerHTML = "";
    emptyMsg.style.display  = "none";
    emptyMsg.textContent    = "⏳ Loading events…";
    emptyMsg.style.display  = "block";

    const { data, error } = await sb
      .from("events")
      .select("*")
      .order("event_date", { ascending: true });

    if(error){
      emptyMsg.textContent = "Failed to load events. Please try again later.";
      return;
    }

    allEvents = (data || []).map(r => ({
      id:        r.id,
      organiser: (r.organiser  || "").trim(),
      name:      (r.name       || "").trim(),
      category:  (r.category   || "").trim(),
      venue:     (r.venue      || "").trim(),
      time:      (r.start_time || "").trim(),
      campus:    (r.campus     || "").trim(),
      date:      r.event_date ? (() => { const d = new Date(r.event_date); d.setHours(0,0,0,0); return d; })() : null,
      image:     (r.cover_image|| "").trim(),
      interested: r.interested_count || 0,
    })).filter(e => e.name && e.date);

    // Build dropdowns from live data merged with master lists
    const clubsFromData = [...new Set(allEvents.map(e => e.organiser).filter(Boolean))];
    const catsFromData  = [...new Set(allEvents.map(e => e.category).filter(Boolean))];
    const mergedClubs   = [...new Set([...ALL_CLUBS, ...clubsFromData])].sort();
    const mergedCats    = [...new Set([...ALL_CATEGORIES, ...catsFromData])].sort();

    buildDropdown(clubFilter, "All Clubs", mergedClubs);
    buildDropdown(catFilter,  "All Categories", mergedCats);

    emptyMsg.style.display = "none";
    render();
  }

  // Wire up filter controls — re-render both list and calendar
  function onFilterChange(){
    if(calSection.style.display !== "none") renderCalendar();
    else render();
  }
  q.addEventListener("input", onFilterChange);
  dateFilter.addEventListener("change", onFilterChange);
  clubFilter.addEventListener("change", onFilterChange);
  catFilter.addEventListener("change", onFilterChange);
  campusFilter.addEventListener("change", onFilterChange);

  clearBtn.addEventListener("click", () => {
    q.value = "";
    dateFilter.value  = "";
    clubFilter.value  = "";
    catFilter.value   = "";
    campusFilter.value= "";
    render();
  });

  upcomingBtn.addEventListener("click", () => {
    mode = "upcoming";
    upcomingBtn.classList.add("active");
    pastBtn.classList.remove("active");
    render();
  });

  pastBtn.addEventListener("click", () => {
    mode = "past";
    pastBtn.classList.add("active");
    upcomingBtn.classList.remove("active");
    render();
  });

  loadEvents();

  /* ══ VIEW SWITCH (List ↔ Calendar) ══ */
  const viewListBtn  = document.getElementById("viewListBtn");
  const viewCalBtn   = document.getElementById("viewCalBtn");
  const listSection  = document.getElementById("listViewSection");
  const calSection   = document.getElementById("calendarSection");
  const pageGrid     = document.querySelector(".page-grid");

  viewListBtn.addEventListener("click", () => {
    viewListBtn.classList.add("active");
    viewCalBtn.classList.remove("active");
    listSection.style.display = "";
    calSection.style.display  = "none";
  });

  viewCalBtn.addEventListener("click", () => {
    viewCalBtn.classList.add("active");
    viewListBtn.classList.remove("active");
    listSection.style.display = "none";
    calSection.style.display  = "";
    renderCalendar();
  });

  /* ══ ADD TO CALENDAR (.ics) ══ */
  function pad(n){ return String(n).padStart(2, "0"); }

  function toUTCString(date){
    // Returns UTC timestamp in iCal format: YYYYMMDDTHHMMSSZ
    return date.getUTCFullYear()
      + pad(date.getUTCMonth() + 1)
      + pad(date.getUTCDate())
      + "T" + pad(date.getUTCHours())
      + pad(date.getUTCMinutes())
      + pad(date.getUTCSeconds()) + "Z";
  }

  function parseEventDateTime(date, timeStr){
    // Build a proper Date object from the event date + time string
    const d = new Date(date);
    let hours = 9, mins = 0;
    if(timeStr){
      const parts = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
      if(parts){
        hours = parseInt(parts[1]);
        mins  = parseInt(parts[2]);
        const meridiem = (parts[3] || "").toUpperCase();
        if(meridiem === "PM" && hours < 12) hours += 12;
        if(meridiem === "AM" && hours === 12) hours = 0;
      }
    }
    d.setHours(hours, mins, 0, 0);
    return d;
  }

  function escapeICS(str){
    // ICS requires escaping of special chars
    return (str || "")
      .replace(/\\/g, "\\\\")
      .replace(/;/g, "\\;")
      .replace(/,/g, "\\,")
      .replace(/\n/g, "\\n");
  }

  function foldICSLine(line){
    // ICS spec: lines must be max 75 octets, fold with CRLF + single space
    if(line.length <= 75) return line;
    let out = "";
    while(line.length > 75){
      out += line.slice(0, 75) + "\r\n ";
      line = line.slice(75);
    }
    return out + line;
  }

  function generateICS(ev){
    const startDate = parseEventDateTime(ev.date, ev.time);
    const endDate   = new Date(startDate.getTime() + 60 * 60 * 1000); // +1 hour
    const now       = new Date();
    const uid       = `${ev.id || Math.random().toString(36).slice(2)}@akucampuslife.edu`;

    const desc = [
      ev.organiser ? `Organised by: ${ev.organiser}` : "",
      ev.campus    ? `Campus: ${ev.campus}`           : "",
      ev.category  ? `Category: ${ev.category}`       : "",
      "AKU Campus Life — studentexperience.github.io/Student-Events/",
    ].filter(Boolean).join("\\n");

    const lines = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//AKU Campus Life//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "X-WR-CALNAME:AKU Campus Life",
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${toUTCString(now)}`,
      `DTSTART:${toUTCString(startDate)}`,
      `DTEND:${toUTCString(endDate)}`,
      `SUMMARY:${escapeICS(ev.name)}`,
      `DESCRIPTION:${desc}`,
      `LOCATION:${escapeICS(ev.venue || "")}`,
      "STATUS:CONFIRMED",
      "TRANSP:OPAQUE",
      "END:VEVENT",
      "END:VCALENDAR",
    ];

    return lines.map(foldICSLine).join("\r\n");
  }

  window.downloadICS = function(eventId){
    const ev = allEvents.find(e => e.id === eventId);
    if(!ev || !ev.date){ alert("Event details not available."); return; }

    const ics      = generateICS(ev);
    const filename = (ev.name || "event").replace(/[^a-z0-9]/gi, "_") + ".ics";

    // iOS Safari doesn't support Blob + a.download
    // Use data: URI which works across all browsers and mobile
    const dataUri  = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);

    // Try modern Blob approach first (works on Android, desktop)
    // Fall back to data: URI for iOS Safari
    try {
      const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch(e){
      // Fallback: open data URI directly (iOS opens in calendar)
      window.open(dataUri);
    }
  };

  /* ══ CALENDAR ══ */
  let calDate     = new Date();
  let calSelected = null;
  const CAL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const CAL_PALETTE = ["#2563eb","#7c3aed","#16a34a","#f59e0b","#dc2626","#0891b2","#db2777","#9333ea"];

  function colorForEvent(e, idx){
    // Stable color based on organiser name hash
    if(!e.organiser) return CAL_PALETTE[idx % CAL_PALETTE.length];
    let hash = 0;
    for(let i = 0; i < e.organiser.length; i++) hash = e.organiser.charCodeAt(i) + ((hash << 5) - hash);
    return CAL_PALETTE[Math.abs(hash) % CAL_PALETTE.length];
  }

  function getFilteredCalEvents(){
    const qv  = q.value.trim().toLowerCase();
    const cv  = clubFilter.value;
    const tv  = catFilter.value;
    const cpv = campusFilter.value;
    return allEvents
      .filter(e => !cv  || e.organiser === cv)
      .filter(e => !tv  || e.category  === tv)
      .filter(e => !cpv || e.campus    === cpv)
      .filter(e => !qv  || `${e.name} ${e.organiser} ${e.category} ${e.venue} ${e.time} ${e.campus}`.toLowerCase().includes(qv));
  }

  function eventsOnDate(date){
    return getFilteredCalEvents().filter(e => e.date && sameDay(e.date, date));
  }

  function renderCalendar(){
    const grid       = document.getElementById("calGrid");
    const monthLabel = document.getElementById("calMonthLabel");
    const detailEl   = document.getElementById("calDetail");

    const year  = calDate.getFullYear();
    const month = calDate.getMonth();
    monthLabel.textContent = `${CAL_MONTHS[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysIn   = new Date(year, month + 1, 0).getDate();
    const todayD   = new Date(); todayD.setHours(0,0,0,0);

    let html = "";

    // Leading empty cells
    for(let i = 0; i < firstDay; i++){
      html += `<div class="cal-day empty"></div>`;
    }

    // Days of month
    for(let d = 1; d <= daysIn; d++){
      const date    = new Date(year, month, d);
      const dayEvts = eventsOnDate(date);
      const isToday = sameDay(date, todayD);
      const isSel   = calSelected && sameDay(date, calSelected);
      const hasEvts = dayEvts.length > 0;

      const classes = [
        "cal-day",
        isToday ? "today" : "",
        isSel   ? "selected" : "",
        hasEvts ? "has-events" : "no-events"
      ].filter(Boolean).join(" ");

      // Up to 2 event pills + "more" indicator (desktop/tablet)
      const pills = dayEvts.slice(0, 2).map((e, i) => {
        const color = colorForEvent(e, i);
        return `<div class="cal-event-pill" style="background:${color};" title="${escapeHtml(e.name)}">${escapeHtml(e.name)}</div>`;
      }).join("");
      const more = dayEvts.length > 2 ? `<div class="cal-event-more">+${dayEvts.length - 2} more</div>` : "";

      // Dots for mobile view
      const dots = dayEvts.slice(0, 4).map((e, i) =>
        `<span class="cal-event-dot" style="background:${colorForEvent(e, i)};"></span>`
      ).join("");

      html += `
        <div class="${classes}" data-date="${date.toISOString()}" ${hasEvts ? `onclick="window.selectCalDay('${date.toISOString()}')"` : ""}>
          <div class="cal-day-num">${d}</div>
          ${pills}
          ${more}
          <div class="cal-day-dots">${dots}</div>
        </div>`;
    }

    grid.innerHTML = html;

    // Render detail panel for selected day (or today by default if has events)
    if(!calSelected){
      const todayEvts = eventsOnDate(todayD);
      if(todayEvts.length > 0 && sameDay(new Date(year,month,1), new Date(todayD.getFullYear(),todayD.getMonth(),1))){
        calSelected = todayD;
      }
    }
    renderCalDetail();
  }

  function renderCalDetail(){
    const detailEl = document.getElementById("calDetail");
    if(!calSelected){
      detailEl.classList.remove("visible");
      detailEl.innerHTML = "";
      return;
    }
    const evts = eventsOnDate(calSelected);
    if(evts.length === 0){
      detailEl.classList.remove("visible");
      detailEl.innerHTML = "";
      return;
    }

    const dateLabel = calSelected.toLocaleDateString("en-GB", {
      weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    detailEl.innerHTML = `
      <div class="cal-detail-title">
        <span>📅</span>
        <span>${escapeHtml(dateLabel)}</span>
        <span style="font-size:12px;color:var(--muted);font-weight:500;">· ${evts.length} event${evts.length !== 1 ? "s" : ""}</span>
      </div>
      <div class="cal-detail-events">
        ${evts.map((e, i) => {
          const color = colorForEvent(e, i);
          const tm    = e.time  ? `<span>⏰ ${escapeHtml(e.time)}</span>`  : "";
          const vn    = e.venue ? `<span>📍 ${escapeHtml(e.venue)}</span>` : "";
          const og    = e.organiser ? `<span>🎭 ${escapeHtml(e.organiser)}</span>` : "";
          const cm    = e.campus ? `<span>🏫 ${escapeHtml(e.campus)}</span>` : "";
          const clubHref = e.organiser ? `href="clubs.html?club=${encodeURIComponent(e.organiser)}"` : "";
          const icsBtn = e.id ? `<button class="add-to-cal-btn" onclick="event.preventDefault();event.stopPropagation();downloadICS('${e.id}')">📆 Add to Calendar</button>` : "";
          return `
            <div class="cal-detail-event">
              <div class="cal-detail-color" style="background:${color};"></div>
              <div class="cal-detail-body">
                <div class="cal-detail-name">${e.organiser ? `<a ${clubHref} style="color:inherit;text-decoration:none;" onclick="event.stopPropagation()">${escapeHtml(e.name)}</a>` : escapeHtml(e.name)}</div>
                <div class="cal-detail-meta">${tm}${vn}${og}${cm}</div>
                <div class="cal-detail-actions">${icsBtn}</div>
              </div>
            </div>`;
        }).join("")}
      </div>`;
    detailEl.classList.add("visible");
  }

  // Expose day click handler
  window.selectCalDay = function(isoDate){
    calSelected = new Date(isoDate);

    // Mobile — show slide-up modal instead of bottom panel
    if(window.innerWidth <= 768){
      const evts = eventsOnDate(calSelected);
      if(!evts.length) return;
      showMobileCalModal(calSelected, evts);
      return;
    }

    renderCalendar();
  };

  window.closeMobileCalModal = function(){
    document.getElementById("calMobileModal").classList.remove("open");
    document.body.style.overflow = "";
  };

  function showMobileCalModal(date, evts){
    const dateLabel = date.toLocaleDateString("en-GB", {
      weekday: "long", day: "numeric", month: "long"
    });
    document.getElementById("calMobileTitle").textContent = dateLabel;
    document.getElementById("calMobileEvents").innerHTML = evts.map((e, i) => {
      const color  = colorForEvent(e, i);
      const tm     = e.time  ? `<span>⏰ ${escapeHtml(e.time)}</span>`  : "";
      const vn     = e.venue ? `<span>📍 ${escapeHtml(e.venue)}</span>` : "";
      const og     = e.organiser ? `<span>🎭 ${escapeHtml(e.organiser)}</span>` : "";
      const icsBtn = e.id ? `<button class="add-to-cal-btn" onclick="downloadICS('${e.id}')">📆 Add to Calendar</button>` : "";
      const clubLink = e.organiser
        ? `<a href="clubs.html?club=${encodeURIComponent(e.organiser)}" style="color:#2563eb;font-size:12px;font-weight:600;text-decoration:none;">View Club →</a>`
        : "";
      return `
        <div class="cal-mobile-event">
          <div class="cal-mobile-color" style="background:${color};"></div>
          <div style="flex:1;min-width:0;">
            <div class="cal-mobile-name">${escapeHtml(e.name)}</div>
            <div class="cal-mobile-meta">${tm}${vn}${og}</div>
            <div class="cal-mobile-actions">${icsBtn}${clubLink}</div>
          </div>
        </div>`;
    }).join("");

    document.getElementById("calMobileModal").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  // Calendar nav
  document.getElementById("calPrev").addEventListener("click", () => {
    calDate.setMonth(calDate.getMonth() - 1);
    calSelected = null;
    renderCalendar();
  });
  document.getElementById("calNext").addEventListener("click", () => {
    calDate.setMonth(calDate.getMonth() + 1);
    calSelected = null;
    renderCalendar();
  });
  document.getElementById("calTodayBtn").addEventListener("click", () => {
    calDate = new Date();
    calSelected = new Date();
    calSelected.setHours(0,0,0,0);
    renderCalendar();
  });

  // Close mobile modal on Escape
  document.addEventListener("keydown", e => {
    if(e.key === "Escape") window.closeMobileCalModal();
  });

});
</script>
</body>
