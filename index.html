<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Life · Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="ttps://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
*{ box-sizing:border-box; }

:root{
  --ink:#111827;
  --border:#e5e7eb;
  --panel:#ffffff;
  --bg:#f3f4f6;
  --shadow:0 8px 18px rgba(0,0,0,.12);
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* ===== Top Bar ===== */
.topbar{
  height:56px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 18px;
  font-weight:600;
}

/* ===== Shell ===== */
.shell{
  display:grid;
  grid-template-columns:180px 1fr;
  min-height:calc(100vh - 56px);
}

/* ===== Left Nav ===== */
.nav{
  background:#fff;
  border-right:1px solid var(--border);
  padding:14px 10px;
}

.nav a{
  display:block;
  padding:10px 12px;
  margin:4px 0;
  border-radius:10px;
  text-decoration:none;
  font-size:14px;
  color:#111;
}

.nav a:hover{ background:#f3f4f6; }

.nav a.active{
  background:#eef2ff;
  font-weight:600;
}

/* ===== Content ===== */
.content{
  padding:24px;
}

.page-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

/* ===== Page Grid ===== */
.page-grid{
  display:grid;
  grid-template-columns:320px 1fr;   /* ✅ FIX: fixed sidebar width */
  gap:22px;
  align-items:start;
}

/* ===== Filters ===== */
.filters{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
}

.filters h3{
  margin:0 0 16px;
  font-size:16px;
  font-weight:600;
}

.toggle{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.toggle button{
  flex:1;
  border:none;
  border-radius:999px;
  padding:10px;
  font-weight:600;
  background:#e5e7eb;
  cursor:pointer;
}

.toggle button.active{
  background:#111827;
  color:#fff;
}

.field{
  margin-bottom:16px;
}

.field label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

.field input,
.field select{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-family:'Poppins',sans-serif;
  font-size:14px;
}

.clear-btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#111827;
  color:#fff;
  border:none;
  font-weight:600;
  cursor:pointer;
}

/* ===== Cards Grid ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);  /* ✅ 4 cards on PC */
  gap:22px;
}

/* Responsive */
@media(max-width:1400px){ .cards{ grid-template-columns:repeat(3,1fr);} }
@media(max-width:1100px){
  .page-grid{ grid-template-columns:1fr; }
  .cards{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:700px){
  .shell{ grid-template-columns:1fr; }
  .nav{ display:none; }
  .cards{ grid-template-columns:1fr; }
}

/* ===== Card ===== */
.card{
  border-radius:18px;
  overflow:hidden;
  box-shadow:var(--shadow);
  min-height:320px;
  background:#fff;
}

.bar{ height:48px; }

.body{
  padding:18px;
  display:flex;
  flex-direction:column;
  height:100%;
}

.date-badge{
  width:56px;
  height:56px;
  border-radius:12px;
  background:#111827;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:700;
  margin-top:-30px;
}

.date-badge .day{ font-size:19px; }
.date-badge .month{ font-size:11px; text-transform:uppercase; }

.title{
  font-size:16.5px;
  font-weight:700;
  margin:10px 0 6px;
}

.meta{
  font-size:14.5px;
  margin:3px 0;
}

.chip{
  margin-top:auto;
  font-size:12.5px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.08);
  width:fit-content;
}
</style>
</head>

<body>

<header class="topbar">Campus Life</header>

<div class="shell">
  <nav class="nav">
    <a href="#">Home</a>
    <a href="#" class="active">Events</a> <!-- ✅ FIX: active tab -->
    <a href="#">Clubs</a>
    <a href="#">News</a>
    <a href="#">Forms</a>
  </nav>

  <main class="content">
    <div class="page-title">Events</div>

    <div class="page-grid">
      <aside class="filters">
        <h3>Search Events</h3>

        <div class="toggle">
          <button class="active">Upcoming</button>
          <button>Past</button>
        </div>

        <div class="field">
          <label>Search</label>
          <input placeholder="Search…" />
        </div>

        <div class="field">
          <label>Date</label>
          <input type="date" />
        </div>

        <div class="field">
          <label>Club</label>
          <select>
            <option>All Clubs</option>
          </select>
        </div>

        <div class="field">
          <label>Category</label>
          <select>
            <option>All Categories</option>
          </select>
        </div>

        <button class="clear-btn">Clear</button>
      </aside>

      <section class="cards">
        <!-- Cards rendered by JS (unchanged logic) -->
      </section>
    </div>
  </main>
</div>

</body>
</html>
