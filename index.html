<!DOCTYPE html>
<html lang="en">

  <title>Student Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

    body {
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;

      margin-bottom: 25px;

      font-weight: bold;
