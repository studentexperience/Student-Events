<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Life – Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- ✅ PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4f6f8;
}

/* ===== TOP BAR ===== */
.topbar{
  height:56px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  padding:0 24px;
  gap:24px;
}

.topbar .title{
  font-size:18px;
  font-weight:600;
}

.topbar .global-search{
  flex:1;
  display:flex;
  justify-content:center;
}

.topbar .global-search input{
  width:420px;
  max-width:100%;
  padding:8px 12px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* ===== MAIN LAYOUT ===== */
.app{
  display:flex;
  height:calc(100vh - 56px);
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:72px;
  background:#ffffff;
  border-right:1px solid #ddd;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:12px;
  gap:18px;
}

.sidebar .nav-item{
  width:100%;
  text-align:center;
  font-size:11px;
  color:#555;
  cursor:pointer;
  padding:8px 0;
}

.sidebar .nav-item.active{
  background:#eef2ff;
  color:#1f2a65;
  font-weight:600;
  border-left:4px solid #1f2a65;
}

/* ===== MAIN CONTENT ===== */
.main{
  flex:1;
  padding:20px 24px;
  overflow-y:auto;
}

/* ===== PAGE HEADER ===== */
.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.page-header h2{
  font-size:28px;
  font-weight:600;
}

.page-header button{
  padding:8px 14px;
  border-radius:6px;
  border:1px solid #1f2a65;
  background:#ffffff;
  color:#1f2a65;
  cursor:pointer;
}

/* ===== CONTENT GRID ===== */
.content{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:24px;
}

/* ===== FILTER PANEL ===== */
.filters{
  background:#ffffff;
  padding:16px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  gap:16px;
}

.filters label{
  font-size:13px;
  font-weight:500;
  margin-bottom:4px;
}

.filters input,
.filters select{
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-family:'Poppins',sans-serif;
}

/* ===== EVENTS GRID ===== */
.events-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:24px;
}

/* ===== EVENT CARD ===== */
.event-card{
  background:#ffffff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
  display:flex;
  flex-direction:column;
}

.event-image{
  height:140px;
  background:#dde3ea;
}

.event-body{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.event-title{
  font-size:15px;
  font-weight:600;
  line-height:1.4;
}

.event-meta{
  font-size:13px;
  color:#444;
}

.event-organizer{
  margin-top:auto;
  padding:8px 14px;
  background:#f1f3f6;
  font-size:12px;
  font-weight:500;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .content{grid-template-columns:1fr;}
  .sidebar{display:none;}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="title">Campus Life</div>
  <div class="global-search">
    <input id="globalSearch" placeholder="Search events, clubs, topics…">
  </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="nav-item">Home</div>
    <div class="nav-item active">Events</div>
    <div class="nav-item">Clubs</div>
    <div class="nav-item">News</div>
    <div class="nav-item">Forms</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="page-header">
      <h2>Events</h2>
      <button id="togglePast">Show Past Events</button>
    </div>

    <div class="content">

      <!-- FILTERS -->
      <div class="filters">
        <div>
          <label>Search Events</label>
          <input id="searchInput" placeholder="Search…">
        </div>

        <div>
          <label>Date</label>
          <input id="dateInput" type="date">
        </div>

        <div>
          <label>Club</label>
          <select id="clubSelect"></select>
        </div>

        <div>
          <label>Category</label>
          <select id="categorySelect"></select>
        </div>
      </div>

      <!-- EVENTS -->
      <div class="events-grid" id="events"></div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

  const csvUrl = "website-data.csv";
  const today = new Date(); today.setHours(0,0,0,0);
  let showPast = false;
  let allEvents = [];

  const searchInput = document.getElementById("searchInput");
  const globalSearch = document.getElementById("globalSearch");
  const dateInput = document.getElementById("dateInput");
  const clubSelect = document.getElementById("clubSelect");
  const categorySelect = document.getElementById("categorySelect");
  const eventsEl = document.getElementById("events");
  const toggleBtn = document.getElementById("togglePast");

  const excelToDate = n=>{
    const d=new Date((Number(n)-25569)*86400000);
    d.setHours(0,0,0,0);
    return d;
  };

  function render(){
    let list = allEvents.filter(e =>
      showPast ? e.date < today : e.date >= today
    );

    const q=(searchInput.value||globalSearch.value).toLowerCase();
    const dv=dateInput.value?new Date(dateInput.value+"T00:00:00"):null;

    list=list.filter(e =>
      (!q || `${e.name} ${e.organiser} ${e.venue}`.toLowerCase().includes(q)) &&
      (!clubSelect.value || e.organiser===clubSelect.value) &&
      (!categorySelect.value || e.category===categorySelect.value) &&
      (!dv || e.date.getTime()===dv.getTime())
    );

    list.sort((a,b)=> showPast?b.date-a.date:a.date-b.date);
    eventsEl.innerHTML="";

    list.forEach(e=>{
      eventsEl.insertAdjacentHTML("beforeend",`
        <div class="event-card">
          <div class="event-image"></div>
          <div class="event-body">
            <div class="event-title">${e.name}</div>
            <div class="event-meta">📅 ${e.date.toDateString()}</div>
            ${e.time?`<div class="event-meta">⏰ ${e.time}</div>`:""}
            ${e.venue?`<div class="event-meta">📍 ${e.venue}</div>`:""}
          </div>
          <div class="event-organizer">🎭 ${e.organiser}</div>
        </div>
      `);
    });
  }

  Papa.parse(csvUrl,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:r=>{
      allEvents = r.data.map(x=>({
        name:x["Event Name"],
        organiser:x["Organiser"],
        category:x["Category of the Event"],
        venue:x["Venue"]||"",
        time:x["Start Time"]||"",
        date:excelToDate(x["Date of the Event"])
      })).filter(e=>e.name && e.date);

      clubSelect.innerHTML =
        "<option value=''>All Clubs</option>" +
        [...new Set(allEvents.map(e=>e.organiser))].sort().map(c=>`<option>${c}</option>`).join("");

      categorySelect.innerHTML =
        "<option value=''>All Categories</option>" +
        [...new Set(allEvents.map(e=>e.category))].sort().map(c=>`<option>${c}</option>`).join("");

      render();
    }
  });

  [searchInput,globalSearch,dateInput,clubSelect,categorySelect].forEach(el=>{
    el.addEventListener("input",render);
  });

  toggleBtn.onclick=()=>{
    showPast=!showPast;
    toggleBtn.textContent=showPast?"Show Upcoming Events":"Show Past Events";
    render();
  };

});
</script>

</body>
</html>
