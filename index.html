<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Student Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- ✅ Google Font: Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- ✅ PapaParse (FIXED) -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:10px;
  font-weight:600;
}

/* ===== VIEW TOGGLE ===== */
.view-toggle{
  max-width:1200px;
  margin:0 auto 14px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.view-toggle button{
  border:none;
  padding:8px 16px;
  border-radius:20px;
  font-size:14px;
  font-family:'Poppins',sans-serif;
  cursor:pointer;
  background:#e5e7eb;
}

.view-toggle button.active{
  background:#111827;
  color:#fff;
}

/* ===== SEARCH BAR ===== */
.toolbar{
  max-width:1200px;
  margin:0 auto 20px;
  display:grid;
  grid-template-columns: 2fr 1fr 1.2fr 1.2fr auto;
  gap:10px;
}

.toolbar input,
.toolbar select,
.toolbar button{
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #d0d0d0;
  font-size:14px;
  font-family:'Poppins',sans-serif;
}

.toolbar button{
  background:#111827;
  color:white;
  cursor:pointer;
}

@media(max-width:900px){
  .toolbar{grid-template-columns:1fr 1fr;}
  .toolbar button{grid-column:span 2;}
}

/* ===== GRID ===== */
.events-container{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:18px;
}

/* ===== CARD ===== */
.event-card{
  border-radius:16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.color-bar{height:40px;}

.card-body{
  padding:12px 14px 14px;
  flex:1;
  display:flex;
  flex-direction:column;
}

.date-badge{
  width:50px;height:50px;
  border-radius:10px;
  background:#111827;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:600;
  margin-top:-24px;
}

.date-badge .day{font-size:17px;}
.date-badge .month{font-size:11px;letter-spacing:1px;text-transform:uppercase;}

.event-title{
  font-size:15.5px;
  font-weight:600;
  margin:8px 0 4px;
}

.event-meta{
  font-size:14px;
  margin:2px 0;
  line-height:1.3;
}

.category{
  margin-top:auto;
  font-size:12px;
  background:rgba(0,0,0,.08);
  padding:4px 10px;
  border-radius:20px;
  align-self:flex-start;
}

.empty{
  text-align:center;
  margin-top:30px;
  color:#555;
}
</style>
</head>

<body>

<h1>Student Events</h1>

<div class="view-toggle">
  <button id="upcomingBtn" class="active">Upcoming Events</button>
  <button id="pastBtn">Past Events</button>
</div>

<div class="toolbar">
  <input id="q" placeholder="Search by event, club, category, venue…" />
  <input id="dateFilter" type="date" />
  <select id="clubFilter"></select>
  <select id="catFilter"></select>
  <button id="clearBtn">Clear</button>
</div>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;"></div>

<script>
const csvUrl="website-data.csv";
const today=new Date(); today.setHours(0,0,0,0);
let mode="upcoming";

const PALETTE=[
 {base:"#F0F7FF",accent:"#D6E6FF"},
 {base:"#F7F3FF",accent:"#E3DBFF"},
 {base:"#FFF6EC",accent:"#FFE6CC"},
 {base:"#F1FAF5",accent:"#D9F2E6"},
 {base:"#FFF0F3",accent:"#FFD6DE"},
 {base:"#F5F5F5",accent:"#E1E1E1"}
];

const excelToDate=n=>{
 const d=new Date((Number(n)-25569)*86400000);
 d.setHours(0,0,0,0);
 return d;
};

let allEvents=[];

function render(){
 const qv=q.value.toLowerCase(),
      cv=clubFilter.value,
      tv=catFilter.value,
      dv=dateFilter.value?new Date(dateFilter.value+"T00:00:00"):null;

 let list=allEvents.filter(e=>{
   return mode==="upcoming" ? e.date>=today : e.date<today;
 });

 list=list
  .filter(e=>!cv||e.organiser===cv)
  .filter(e=>!tv||e.category===tv)
  .filter(e=>!dv||e.date.getTime()===dv.getTime())
  .filter(e=>!qv||`${e.name} ${e.organiser} ${e.category} ${e.venue}`
      .toLowerCase().includes(qv));

 list.sort((a,b)=>mode==="upcoming"?a.date-b.date:b.date-a.date);

 events.innerHTML="";
 emptyMsg.style.display="none";

 if(!list.length){
   emptyMsg.style.display="block";
   emptyMsg.textContent="No events to show.";
   return;
 }

 list.forEach((e,i)=>{
   const {base,accent}=PALETTE[i%PALETTE.length];
   const day=String(e.date.getDate()).padStart(2,"0");
   const month=e.date.toLocaleString("en-US",{month:"short"});
   events.insertAdjacentHTML("beforeend",`
    <div class="event-card" style="background:${base}">
      <div class="color-bar" style="background:${accent}"></div>
      <div class="card-body">
        <div class="date-badge"><div class="day">${day}</div><div class="month">${month}</div></div>
        <div class="event-title">${e.name}</div>
        ${e.organiser?`<div class="event-meta">🎭 ${e.organiser}</div>`:""}
        ${e.venue?`<div class="event-meta">📍 ${e.venue}</div>`:""}
        ${e.time?`<div class="event-meta">⏰ ${e.time}</div>`:""}
        <div class="category">${e.category}</div>
      </div>
    </div>
   `);
 });
}

Papa.parse(csvUrl,{
 download:true,header:true,skipEmptyLines:true,
 complete:r=>{
  allEvents=r.data.map(x=>({
    name:x["Event Name"],
    organiser:x["Organiser"],
    category:x["Category of the Event"],
    venue:x["Venue"]||"",
    time:x["Start Time"]||"",
    date:excelToDate(x["Date of the Event"])
  })).filter(e=>e.name&&e.date);

  clubFilter.innerHTML=`<option value="">Choose club</option>`+
     [...new Set(allEvents.map(e=>e.organiser))].sort().map(c=>`<option>${c}</option>`).join("");
  catFilter.innerHTML=`<option value="">Choose category</option>`+
     [...new Set(allEvents.map(e=>e.category))].sort().map(c=>`<option>${c}</option>`).join("");

  q.oninput=dateFilter.onchange=clubFilter.onchange=catFilter.onchange=render;
  clearBtn.onclick=()=>{q.value=dateFilter.value=clubFilter.value=catFilter.value="";render();};

  render();
 }
});

upcomingBtn.onclick=()=>{mode="upcoming";
 upcomingBtn.classList.add("active");
 pastBtn.classList.remove("active");
 render();};

pastBtn.onclick=()=>{mode="past";
 pastBtn.classList.add("active");
 upcomingBtn.classList.remove("active");
 render();};

const q=document.getElementById("q"),
clubFilter=document.getElementById("clubFilter"),
catFilter=document.getElementById("catFilter"),
dateFilter=document.getElementById("dateFilter"),
clearBtn=document.getElementById("clearBtn"),
events=document.getElementById("events"),
emptyMsg=document.getElementById("emptyMsg"),
upcomingBtn=document.getElementById("upcomingBtn"),
pastBtn=document.getElementById("pastBtn");
</script>

</body>
</html>
