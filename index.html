<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PapaParse CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin: 12px 0 18px;
    }

    .toolbar {
      max-width: 1200px;
      margin: 0 auto 18px;
      display: grid;
      grid-template-columns: 1.5fr 0.9fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d7d7d7;
      background: #fff;
      font-size: 14px;
    }

    .toolbar button {
      cursor: pointer;
      background: #111827;
      color: #fff;
      border: 1px solid #111827;
    }

    .toolbar button:hover {
      background: #0b1220;
    }

    .hint {
      max-width: 1200px;
      margin: 0 auto 14px;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    .events-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: auto;
    }

    .event-card {
      background: #fffbea;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }

    .event-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .event-meta {
      font-size: 14px;
      margin: 4px 0;
      color: #333;
    }

    .tag {
      display: inline-block;
      background: #e0e0e0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 6px;
    }

    .empty {
      text-align: center;
      color: #444;
      margin-top: 24px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
      .toolbar button {
        grid-column: span 2;
      }
    }
  </style>
</head>

<body>
  <h1>Upcoming Student Events</h1>

  <div class="toolbar">
    <input id="q" type="text" placeholder="Search (event, club, category, venue)…" />
    <input id="dateFilter" type="date" />
    <select id="clubFilter"></select>
    <select id="catFilter"></select>
    <button id="clearBtn" type="button">Clear</button>
  </div>

  <div class="hint">
    Tip: You can search and filter by date, club, or type of activity.
  </div>

  <div class="events-container" id="events"></div>
  <div class="empty" id="emptyMsg" style="display:none;"></div>

<script>
  const csvUrl = "website-data.csv";

  // ✅ Master lists (authoritative, alphabetical)
  const ALL_CLUBS = [
    "ACC MC - Undergraduate",
    "ACC SONAM - Graduate",
    "ACC SONAM - Undergraduate",
    "ACCs FAS",
    "Activity Club IED",
    "AKU Athletics Club",
    "AKU Chess Club",
    "AKU Graduate Education Student Society (AGESS)",
    "AKU Journalism Club",
    "AKU Majlis",
    "AKU MUN",
    "AKU Photography Club",
    "Arts and Culture Committee (AAC) (AKU-FAS)",
    "Arts and Culture Committee (AAC) (AKU-IED)",
    "Arts and Culture Committee (AAC) (AKU-SONAM) Graduate",
    "Arts and Culture Committee (AAC) (AKU-SONAM) Undergraduate",
    "Arts and Culture Committee (ACC) (AKU-MC)",
    "Aurora",
    "Class Representative",
    "Club for Theatrics (ACT)",
    "Entrepreneurial Society (AES)",
    "Explorers Club",
    "FALAH (FAS)",
    "FALAH (MBBS)",
    "FALAH (SONAM)",
    "Music Society",
    "OSEP Internal",
    "Public Speaking Forum (PSF)",
    "Publication and Literary Society (APLS) (FAS)",
    "Publication and Literary Society (APLS) (MBBS)",
    "Publication and Literary Society (APLS) (SONAM)",
    "Rowing Club (ARC)",
    "Society for Arts and Culture",
    "Society of Climate Conservation and Health (SoCCH)",
    "Sports Society",
    "Student Research Forum (SRF) (FAS)",
    "Student Research Forum (SRF) (MBBS)",
    "Student Research Forum (SRF) (SONAM)",
    "SRF-FAS Conference",
    "Synergy (FAS)",
    "Synergy (MBBS)",
    "Synergy (SONAM)"
  ];

  const ALL_CATEGORIES = [
    "Competition",
    "Meeting",
    "Orientation",
    "Other",
    "Recreational/Social",
    "Sports",
    "Welfare",
    "Workshop/Session"
  ];

  let allEvents = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function excelSerialToDate(n) {
    n = Number(n);
    if (!Number.isFinite(n)) return null;
    const d = new Date((n - 25569) * 86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function fillSelect(id, list, label) {
    const el = document.getElementById(id);
    el.innerHTML =
      `<option value="">${label}</option>` +
      list.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
  }

  function render() {
    const q = document.getElementById("q").value.trim().toLowerCase();
    const club = document.getElementById("clubFilter").value;
    const cat  = document.getElementById("catFilter").value;
    const dateVal = document.getElementById("dateFilter").value;

    let selectedDate = null;
    if (dateVal) {
      selectedDate = new Date(dateVal + "T00:00:00");
      selectedDate.setHours(0,0,0,0);
    }

    const filtered = allEvents
      .filter(e => e.date >= today)
      .filter(e => !club || e.organiser === club)
      .filter(e => !cat  || e.category === cat)
      .filter(e => !selectedDate || e.date.getTime() === selectedDate.getTime())
      .filter(e => {
        if (!q) return true;
        const hay = `${e.name} ${e.organiser} ${e.category} ${e.venue}`.toLowerCase();
        return hay.includes(q);
      })
      .sort((a,b) => (a.date - b.date) || a.name.localeCompare(b.name));

    const container = document.getElementById("events");
    const emptyMsg = document.getElementById("emptyMsg");
    container.innerHTML = "";

    if (filtered.length === 0) {
      emptyMsg.style.display = "block";
      emptyMsg.innerHTML =
        "✨ Looks like our clubs and societies are taking a short break before the fun begins again 🙂";
      return;
    }

    emptyMsg.style.display = "none";

    filtered.forEach(e => {
      const card = document.createElement("div");
      card.className = "event-card";
      card.innerHTML = `
        <div class="event-title">${escapeHtml(e.name)}</div>
        <div class="event-meta">📅 ${e.date.toDateString()}</div>
        <div class="event-meta">⏰ ${escapeHtml(e.startTime)}</div>
        <div class="event-meta">📍 ${escapeHtml(e.venue)}</div>
        <div class="event-meta">🏷 ${escapeHtml(e.organiser)}</div>
        <span class="tag">${escapeHtml(e.category)}</span>
      `;
      container.appendChild(card);
    });
  }

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(res) {
      allEvents = res.data
        .map(r => ({
          organiser: (r["Organiser"] || "").trim(),
          name: (r["Event Name"] || "").trim(),
          category: (r["Category of the Event"] || "").trim(),
          date: excelSerialToDate(r["Date of the Event"]),
          startTime: (r["Start Time"] || "").trim(),
          venue: (r["Venue"] || "").trim()
        }))
        .filter(e => e.name && e.date);

      fillSelect("clubFilter", ALL_CLUBS, "All Clubs");
      fillSelect("catFilter", ALL_CATEGORIES, "All Categories");

      document.getElementById("q").addEventListener("input", render);
      document.getElementById("dateFilter").addEventListener("change", render);
      document.getElementById("clubFilter").addEventListener("change", render);
      document.getElementById("catFilter").addEventListener("change", render);
      document.getElementById("clearBtn").addEventListener("click", () => {
        q.value = dateFilter.value = clubFilter.value = catFilter.value = "";
        render();
      });

      render();
    }
  });
</script>
</body>
</html>
