<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campus Life · Events</title>

<!-- Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --ink:#111827;
  --bg:#f3f4f6;
  --panel:#ffffff;
  --border:#e5e7eb;
  --shadow:0 10px 24px rgba(0,0,0,.14);
}

/* Reset */
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* Header */
.topbar{
  height:56px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 18px;
  font-weight:600;
}

/* Layout */
.shell{
  display:grid;
  grid-template-columns:180px 1fr;
  min-height:calc(100vh - 56px);
}

/* Side nav */
.nav{
  background:#fff;
  border-right:1px solid var(--border);
  padding:14px 10px;
}
.nav a{
  display:block;
  padding:10px 12px;
  margin:4px 0;
  border-radius:10px;
  text-decoration:none;
  color:#111;
  font-size:14px;
}
.nav a.active{
  background:#eef2ff;
  font-weight:600;
}

/* Content */
.content{ padding:22px; }
.page-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

/* Grid */
.page-grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:22px;
}

/* Filters */
.filters{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
}
.filters h3{
  margin-bottom:16px;
  font-size:16px;
  font-weight:600;
}
.field{ margin-bottom:16px; }
.field label{
  font-size:13px;
  font-weight:600;
  display:block;
  margin-bottom:6px;
}
.field input,
.field select{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-family:'Poppins',sans-serif;
}

/* Cards grid */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}

/* ✅ BIG CARD */
.card{
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  min-height:480px; /* ~1.5× larger */
}

/* ✅ COVER IMAGE SPACE */
.card-cover{
  height:180px;
  background:linear-gradient(135deg,#dbeafe,#e0e7ff);
  background-size:cover;
  background-position:center;
}

/* Card body */
.card-body{
  padding:22px 20px 18px;
  display:flex;
  flex-direction:column;
  flex:1;
}

/* Title */
.card-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:18px; /* two-line space */
}

/* Meta */
.card-meta{
  font-size:15px;
  margin:6px 0;
}

/* Organizer banner */
.organizer{
  margin-top:auto;
  padding:12px 14px;
  background:rgba(0,0,0,.06);
  border-radius:14px;
  font-size:13.5px;
  font-weight:600;
}

/* Responsive */
@media(max-width:1400px){ .cards{ grid-template-columns:repeat(3,1fr);} }
@media(max-width:1100px){
  .page-grid{ grid-template-columns:1fr; }
  .cards{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:700px){
  .shell{ grid-template-columns:1fr; }
  .nav{ display:none; }
  .cards{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header class="topbar">Campus Life</header>

<div class="shell">
<nav class="nav">
  <a href="#">Home</a>
  <a href="#" class="active">Events</a>
  <a href="#">Clubs</a>
  <a href="#">News</a>
  <a href="#">Forms</a>
</nav>

<main class="content">
<div class="page-title">Events</div>

<div class="page-grid">
  <aside class="filters">
    <h3>Search Events</h3>
    <div class="field"><label>Search</label><input/></div>
    <div class="field"><label>Date</label><input type="date"/></div>
    <div class="field"><label>Club</label><select></select></div>
    <div class="field"><label>Category</label><select></select></div>
  </aside>

  <section class="cards" id="events"></section>
</div>
</main>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{
  const eventsEl=document.getElementById("events");

  // Example rendering (your CSV logic plugs in here unchanged)
  const sample = {
    name:"FAS Gala 3.0",
    date:"Sun May 10 2026",
    time:"6:30 PM",
    venue:"SRC Poolside",
    organiser:"Synergy (FAS)"
  };

  eventsEl.innerHTML = `
    <article class="card">
      <div class="card-cover"></div>
      <div class="card-body">
        <div class="card-title">${sample.name}</div>

        <div class="card-meta">📅 ${sample.date}</div>
        <div class="card-meta">⏰ ${sample.time}</div>
        <div class="card-meta">📍 ${sample.venue}</div>

        <div class="organizer">🎭 ${sample.organiser}</div>
      </div>
    </article>
  `;
});
</script>

</body>
</html>
