<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upcoming Student Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}

h1 {
  text-align:center;
  margin-bottom:18px;
}

.events-container {
  max-width:1100px;
  margin:auto;
  display:grid;
  gap:18px;
}

/* ===== Card ===== */
.event-card {
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,0.12);
  display:flex;
  background:white;
}

/* ===== Date block ===== */
.event-date {
  background:#eef2f7;
  padding:16px 14px;
  min-width:90px;
  text-align:center;
}

.event-date .day {
  font-size:28px;
  font-weight:bold;
}

.event-date .month {
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* ===== Content ===== */
.event-content {
  flex:1;
  padding:16px 18px;
}

.event-title {
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
}

.event-meta {
  font-size:14px;
  margin:4px 0;
  color:#333;
}

/* ===== Pastel background variants ===== */
.bg-0 { background:#F0F7FF; }
.bg-1 { background:#F7F3FF; }
.bg-2 { background:#FFF6EC; }
.bg-3 { background:#F1FAF5; }
.bg-4 { background:#FFF0F3; }
.bg-5 { background:#F5F5F5; }

.empty {
  text-align:center;
  margin-top:30px;
  font-size:15px;
}
</style>
</head>

<body>

<h1>Upcoming Student Events</h1>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;">
✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)
</div>

<script>
const csvUrl = "website-data.csv";

const CARD_COLORS_COUNT = 6;
const today = new Date();
today.setHours(0,0,0,0);

function excelToDate(n) {
  const d = new Date((Number(n)-25569)*86400000);
  d.setHours(0,0,0,0);
  return d;
}

Papa.parse(csvUrl,{
  download:true,
  header:true,
  skipEmptyLines:true,
  complete(res){
    const container = document.getElementById("events");
    const emptyMsg = document.getElementById("emptyMsg");

    const events = res.data
      .map((r,i)=>({
        name:r["Event Name"],
        organiser:r["Organiser"],
        venue:r["Venue"],
        time:r["Start Time"],
        date:excelToDate(r["Date of the Event"]),
        colorIndex: i % CARD_COLORS_COUNT
      }))
      .filter(e=>e.name && e.date >= today)
      .sort((a,b)=>a.date-b.date);

    if(!events.length){
      emptyMsg.style.display="block";
      return;
    }

    events.forEach(e=>{
      const day = String(e.date.getDate()).padStart(2,"0");
      const month = e.date.toLocaleString("en-US",{month:"short"});

      container.insertAdjacentHTML("beforeend",`
        <div class="event-card bg-${e.colorIndex}">
          <div class="event-date">
            <div class="day">${day}</div>
            <div class="month">${month}</div>
          </div>

          <div class="event-content">
            <div class="event-title">${e.name}</div>
            <div class="event-meta">🎭 ${e.organiser}</div>
            <div class="event-meta">📍 ${e.venue || ""}</div>
            <div class="event-meta">⏰ ${e.time || ""}</div>
          </div>
        </div>
      `);
    });
  }
});
</script>

</body>
</html>
