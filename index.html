<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PapaParse CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin: 12px 0 18px;
    }

    .toolbar {
      max-width: 1200px;
      margin: 0 auto 18px;
      display: grid;
      grid-template-columns: 1.6fr 1fr 1.1fr 1.1fr auto;
      gap: 10px;
      align-items: center;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d7d7d7;
      background: #fff;
      font-size: 14px;
    }

    .toolbar button {
      cursor: pointer;
      background: #111827;
      color: #fff;
    }

    .events-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: auto;
    }

    .event-card {
      background: #fffbea;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }

    .event-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .event-meta {
      font-size: 14px;
      margin: 4px 0;
      color: #333;
    }

    /* ✅ Category Tags (Base) */
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      color: white;
      margin-top: 8px;
    }

    /* ✅ Color‑coded categories */
    .tag-sports { background: #16a34a; }              /* Green */
    .tag-recreational-social { background: #7c3aed; } /* Purple */
    .tag-workshop-session { background: #2563eb; }    /* Blue */
    .tag-orientation { background: #ea580c; }          /* Orange */
    .tag-competition { background: #dc2626; }          /* Red */
    .tag-welfare { background: #0f766e; }               /* Teal */
    .tag-meeting { background: #6b7280; }               /* Gray */
    .tag-other { background: #9ca3af; color:#111; }     /* Light gray */

    .empty {
      text-align: center;
      color: #444;
      margin-top: 26px;
      font-size: 15px;
    }
  </style>
</head>

<body>

<h1>Upcoming Student Events</h1>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;">
  ✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)
</div>

<script>
  const csvUrl = "website-data.csv";

  const today = new Date();
  today.setHours(0,0,0,0);

  function excelToDate(n) {
    const d = new Date((Number(n) - 25569) * 86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function slugifyCategory(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, "-");
  }

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete(res) {
      const container = document.getElementById("events");
      const emptyMsg = document.getElementById("emptyMsg");

      const upcoming = res.data
        .map(r => ({
          name: r["Event Name"],
          organiser: r["Organiser"],
          category: r["Category of the Event"],
          date: excelToDate(r["Date of the Event"]),
          time: r["Start Time"],
          venue: r["Venue"]
        }))
        .filter(e => e.name && e.date >= today)
        .sort((a,b) => a.date - b.date);

      if (upcoming.length === 0) {
        emptyMsg.style.display = "block";
        return;
      }

      upcoming.forEach(e => {
        const tagClass = "tag-" + slugifyCategory(e.category);
        const card = document.createElement("div");
        card.className = "event-card";

        card.innerHTML = `
          <div class="event-title">${e.name}</div>
          <div class="event-meta">📅 ${e.date.toDateString()}</div>
          <div class="event-meta">⏰ ${e.time || ""}</div>
          <div class="event-meta">📍 ${e.venue || ""}</div>
          <div class="event-meta">🏷 ${e.organiser || ""}</div>
          <span class="tag ${tagClass}">${e.category}</span>
        `;

        container.appendChild(card);
      });
    }
  });
</script>

</body>
</html>
