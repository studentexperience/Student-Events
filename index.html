<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ Google Font: Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- ✅ PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}

h1 {
  text-align:center;
  font-weight:600;
  margin-bottom:10px;
}

/* View toggle */
.view-toggle {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
}

.view-toggle button {
  padding:8px 16px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:#e5e7eb;
}

.view-toggle button.active {
  background:#111827;
  color:white;
}

/* Toolbar */
.toolbar {
  max-width:1200px;
  margin:0 auto 20px;
  display:grid;
  grid-template-columns:2fr 1fr 1.2fr 1.2fr auto;
  gap:10px;
}

.toolbar input, .toolbar select, .toolbar button {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.toolbar button {
  background:#111827;
  color:white;
  cursor:pointer;
}

/* Grid */
.events-container {
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
  gap:18px;
}

/* Card */
.event-card {
  border-radius:16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.color-bar { height:40px; }

.card-body {
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.date-badge {
  width:50px;
  height:50px;
  border-radius:10px;
  background:#111827;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:600;
  margin-top:-24px;
}

.event-title { font-weight:600; margin:8px 0 4px; }
.event-meta { font-size:14px; margin:2px 0; }

.category {
  margin-top:auto;
  font-size:12px;
  background:rgba(0,0,0,.08);
  padding:4px 10px;
  border-radius:20px;
  align-self:flex-start;
}

.empty {
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>

<h1>Student Events</h1>

<div class="view-toggle">
  <button id="upcomingBtn" class="active">Upcoming Events</button>
  <button id="pastBtn">Past Events</button>
</div>

<div class="toolbar">
  <input id="q" placeholder="Search by event, club, category…" />
  <input id="dateFilter" type="date" />
  <select id="clubFilter"></select>
  <select id="catFilter"></select>
  <button id="clearBtn">Clear</button>
</div>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;">No events to show.</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  console.log("✅ DOM loaded, Papa:", typeof Papa);

  const csvUrl = "website-data.csv";
  const today = new Date(); today.setHours(0,0,0,0);
  let mode = "upcoming";
  let allEvents = [];

  const PALETTE = [
    {base:"#F0F7FF",accent:"#D6E6FF"},
    {base:"#FFF6EC",accent:"#FFE6CC"},
    {base:"#F1FAF5",accent:"#D9F2E6"},
    {base:"#F7F3FF",accent:"#E3DBFF"}
  ];

  const excelToDate = v => {
    const d = new Date((Number(v) - 25569) * 86400000);
    d.setHours(0,0,0,0);
    return d;
  };

  const q = document.getElementById("q");
  const dateFilter = document.getElementById("dateFilter");
  const clubFilter = document.getElementById("clubFilter");
  const catFilter = document.getElementById("catFilter");
  const clearBtn = document.getElementById("clearBtn");
  const events = document.getElementById("events");
  const emptyMsg = document.getElementById("emptyMsg");
  const upcomingBtn = document.getElementById("upcomingBtn");
  const pastBtn = document.getElementById("pastBtn");

  function render() {
    let list = allEvents.filter(e =>
      mode === "upcoming" ? e.date >= today : e.date < today
    );

    if (!list.length) {
      emptyMsg.style.display="block";
      events.innerHTML="";
      return;
    }

    emptyMsg.style.display="none";
    list.sort((a,b)=> mode==="upcoming" ? a.date-b.date : b.date-a.date);

    events.innerHTML="";
    list.forEach((e,i)=>{
      const {base,accent} = PALETTE[i%PALETTE.length];
      events.innerHTML += `
        <div class="event-card" style="background:${base}">
          <div class="color-bar" style="background:${accent}"></div>
          <div class="card-body">
            <div class="date-badge">${e.date.getDate()}</div>
            <div class="event-title">${e.name}</div>
            <div class="event-meta">🎭 ${e.organiser}</div>
            <div class="category">${e.category}</div>
          </div>
        </div>`;
    });
  }

  Papa.parse(csvUrl,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:r=>{
      allEvents = r.data.map(x=>({
        name:x["Event Name"],
        organiser:x["Organiser"],
        category:x["Category of the Event"],
        date:excelToDate(x["Date of the Event"])
      })).filter(e=>e.name && e.date);

      clubFilter.innerHTML="<option value=''>All clubs</option>";
      catFilter.innerHTML="<option value=''>All categories</option>";

      render();
    }
  });

  upcomingBtn.onclick=()=>{mode="upcoming"; upcomingBtn.classList.add("active"); pastBtn.classList.remove("active"); render();}
  pastBtn.onclick=()=>{mode="past"; pastBtn.classList.add("active"); upcomingBtn.classList.remove("active"); render();}

});
</script>

</body>
</html>
