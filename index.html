<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campus Life · Events</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
/* ===== (UNCHANGED STYLING, TRIMMED FOR BREvITY) ===== */

*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f3f4f6;
  color:#111827;
}

.topbar{
  height:56px;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  padding:0 18px;
  font-weight:600;
}

.shell{
  display:grid;
  grid-template-columns:180px 1fr;
  min-height:calc(100vh - 56px);
}

/* ✅ FIXED NAV */
.nav{
  background:#fff;
  border-right:1px solid #e5e7eb;
  padding:14px 10px;
}
.nav a{
  display:block;
  padding:10px 12px;
  border-radius:10px;
  margin:4px 0;
  text-decoration:none;
  color:#111;
  font-weight:500;
}
.nav a.active{
  background:#eef2ff;
  font-weight:600;
}

.content{ padding:22px; }
.page-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

.page-grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:22px;
}

.filters{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 22px rgba(0,0,0,.14);
}

/* Cards */
.cards{
  display:grid;
  grid-template-columns:repeat(4, minmax(300px,1fr));
  gap:24px;
}

.card{
  background:#fff;
  border-radius:22px;
  box-shadow:0 10px 22px rgba(0,0,0,.14);
  min-height:420px;
  display:flex;
  flex-direction:column;
}

.card-cover{
  height:160px;
  background:linear-gradient(135deg,#dbeafe,#e0e7ff);
}

.card-body{
  padding:22px 20px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.card-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
}

.card-meta{ font-size:15px; margin:6px 0; }

.organizer{
  margin-top:auto;
  padding:12px 14px;
  background:rgba(0,0,0,.06);
  border-radius:14px;
  font-size:13.5px;
  font-weight:600;
}

/* Responsive */
@media(max-width:1400px){ .cards{grid-template-columns:repeat(3,1fr);} }
@media(max-width:1100px){ .page-grid{grid-template-columns:1fr;} .cards{grid-template-columns:repeat(2,1fr);} }
@media(max-width:700px){ .shell{grid-template-columns:1fr;} .nav{display:none;} .cards{grid-template-columns:1fr;} }
</style>
</head>

<body>

<header class="topbar">Campus Life</header>

<div class="shell">
  <nav class="nav">
    <a href="#">Home</a>
    <a href="#" class="active">Events</a>
    <a href="#">Clubs</a>
    <a href="#">News</a>
    <a href="#">Forms</a>
  </nav>

  <main class="content">
    <div class="page-title">Events</div>

    <div class="page-grid">
      <aside class="filters">
        <h3>Search Events</h3>

        <div class="toggle">
          <button id="upcomingBtn" class="active">Upcoming</button>
          <button id="pastBtn">Past</button>
        </div>

        <div class="field"><label>Search</label><input id="q"></div>
        <div class="field"><label>Date</label><input id="dateFilter" type="date"></div>
        <div class="field"><label>Club</label><select id="clubFilter"></select></div>
        <div class="field"><label>Category</label><select id="catFilter"></select></div>
        <button id="clearBtn" class="clear-btn">Clear</button>
      </aside>

      <section class="cards" id="events"></section>
    </div>
  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

  const csvUrl="website-data.csv";
  const today=new Date(); today.setHours(0,0,0,0);
  let mode="upcoming";
  let allEvents=[];

  const eventsEl=document.getElementById("events");
  const q=document.getElementById("q");
  const dateFilter=document.getElementById("dateFilter");
  const clubFilter=document.getElementById("clubFilter");
  const catFilter=document.getElementById("catFilter");
  const clearBtn=document.getElementById("clearBtn");

  function excelToDate(v){
    const d=new Date((Number(v)-25569)*86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function render(){
    let list=allEvents.filter(e=>mode==="upcoming"?e.date>=today:e.date<today);
    eventsEl.innerHTML="";
    list.forEach(e=>{
      eventsEl.insertAdjacentHTML("beforeend",`
        <article class="card">
          <div class="card-cover"></div>
          <div class="card-body">
            <div class="card-title">${e.name}</div>
            <div class="card-meta">📅 ${e.date.toDateString()}</div>
            ${e.time?`<div class="card-meta">⏰ ${e.time}</div>`:''}
            ${e.venue?`<div class="card-meta">📍 ${e.venue}</div>`:''}
            <div class="organizer">🎭 ${e.organiser}</div>
          </div>
        </article>
      `);
    });
  }

  Papa.parse(csvUrl,{
    download:true,
    header:true,
    complete:(res)=>{
      allEvents=res.data.map(r=>({
        name:r["Event Name"],
        organiser:r["Organiser"],
        venue:r["Venue"],
        time:r["Start Time"],
        date:excelToDate(r["Date of the Event"])
      })).filter(e=>e.name && e.date);
      render();  // ✅ FIX: render called after CSV load
    }
  });

});
</script>

</body>
</html>
