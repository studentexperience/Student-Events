<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campus Life · Events</title>

<!-- Google Font -->
https://fonts.googleapis.com
https://fonts.gstatic.com
https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap

<!-- PapaParse -->
https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.jsscript>

<style>
:root{
  --ink:#111827;
  --bg:#f3f4f6;
  --panel:#fff;
  --border:#e5e7eb;
  --shadow:0 10px 22px rgba(0,0,0,.14);
}
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* Header */
.topbar{
  height:56px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 18px;
  font-weight:600;
}

/* Layout */
.shell{
  display:grid;
  grid-template-columns:180px 1fr;
  min-height:calc(100vh - 56px);
}

/* Nav */
.nav{
  background:#fff;
  border-right:1px solid var(--border);
  padding:14px 10px;
}
.nav a{
  display:block;
  padding:10px 12px;
  margin:4px 0;
  border-radius:10px;
  text-decoration:none;
  color:#111;
}
.nav a.active{
  background:#eef2ff;
  font-weight:600;
}

/* Content */
.content{ padding:22px; }
.page-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

/* Page grid */
.page-grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:22px;
}

/* Filters */
.filters{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
}
.filters h3{ margin-bottom:16px; }

.field{ margin-bottom:16px; }
.field label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}
.field input,
.field select{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-family:'Poppins',sans-serif;
}

.toggle{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}
.toggle button{
  flex:1;
  border:none;
  border-radius:999px;
  padding:10px;
  font-weight:600;
  background:#e5e7eb;
  cursor:pointer;
}
.toggle button.active{
  background:#111827;
  color:#fff;
}

/* ✅ Clear button restored */
.clear-btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111827;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
}

/* Cards grid */
.cards{
  display:grid;
  grid-template-columns:repeat(4, minmax(300px,1fr));
  gap:24px;
}

/* Card */
.card{
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  min-height:420px;
  display:flex;
  flex-direction:column;
}

/* Cover */
.card-cover{
  height:160px;
  background:linear-gradient(135deg,#dbeafe,#e0e7ff);
}

/* Body */
.card-body{
  padding:22px 20px 18px;
  display:flex;
  flex-direction:column;
  flex:1;
}

/* Title */
.card-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
}

/* Meta */
.card-meta{
  font-size:15px;
  margin:6px 0;
}

/* Organizer */
.organizer{
  margin-top:auto;
  padding:12px 14px;
  background:rgba(0,0,0,.06);
  border-radius:14px;
  font-size:13.5px;
  font-weight:600;
}

/* Responsive */
@media(max-width:1400px){
  .cards{ grid-template-columns:repeat(3,1fr); }
}
@media(max-width:1100px){
  .page-grid{ grid-template-columns:1fr; }
  .cards{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:700px){
  .shell{ grid-template-columns:1fr; }
  .nav{ display:none; }
  .cards{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header class="topbar">Campus Life</header>

<div class="shell">
<nav class="nav">
  #Home</a>
  #Events</a>
  #Clubs</a>
  #News</a>
  #Forms</a>
</nav>

<main class="content">
<div class="page-title">Events</div>

<div class="page-grid">
  <aside class="filters">
    <h3>Search Events</h3>

    <div class="toggle">
      <button id="upcomingBtn" class="active">Upcoming</button>
      <button id="pastBtn">Past</button>
    </div>

    <div class="field"><label>Search</label><input id="q"></div>
    <div class="field"><label>Date</label><input id="dateFilter" type="date"></div>
    <div class="field"><label>Club</label><select id="clubFilter"></select></div>
    <div class="field"><label>Category</label><select id="catFilter"></select></div>

    <!-- ✅ Clear button restored -->
    <button id="clearBtn" class="clear-btn">Clear</button>
  </aside>

  <section class="cards" id="events"></section>
</div>
</main>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

  const csvUrl="website-data.csv";
  const today=new Date(); today.setHours(0,0,0,0);
  let mode="upcoming", allEvents=[];

  const q=document.getElementById("q");
  const dateFilter=document.getElementById("dateFilter");
  const clubFilter=document.getElementById("clubFilter");
  const catFilter=document.getElementById("catFilter");
  const clearBtn=document.getElementById("clearBtn");
  const upcomingBtn=document.getElementById("upcomingBtn");
  const pastBtn=document.getElementById("pastBtn");
  const eventsEl=document.getElementById("events");

  function excelToDate(v){
    const d=new Date((Number(v)-25569)*86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function sameDay(a,b){ return a && b && a.getTime()===b.getTime(); }

  function render(){
    const qv=q.value.toLowerCase();
    const cv=clubFilter.value;
    const tv=catFilter.value;
    const dv=dateFilter.value?new Date(dateFilter.value+"T00:00:00"):null;

    let list=allEvents
      .filter(e=>mode==="upcoming"?e.date>=today:e.date<today)
      .filter(e=>!qv || `${e.name} ${e.organiser} ${e.venue} ${e.time}`.toLowerCase().includes(qv))
      .filter(e=>!cv || e.organiser===cv)
      .filter(e=>!tv || e.category===tv)
      .filter(e=>!dv || sameDay(e.date,dv));

    list.sort((a,b)=>mode==="upcoming"?a.date-b.date:b.date-a.date);

    eventsEl.innerHTML="";
    list.forEach(e=>{
      eventsEl.insertAdjacentHTML("beforeend",`
        <article class="card">
          <div class="card-cover"></div>
          <div class="card-body">
            <div class="card-title">${e.name}</div>
            <div class="card-meta">📅 ${e.date.toDateString()}</div>
            ${e.time?`<div class="card-meta">⏰ ${e.time}</div>`:""}
            ${e.venue?`<div class="card-meta">📍 ${e.venue}</div>`:""}
            <div class="organizer">🎭 ${e.organiser}</div>
          </div>
        </article>
      `);
    });
  }

  Papa.parse(csvUrl,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:res=>{
      allEvents=res.data.map(r=>({
        name:r["Event Name"],
        organiser:r["Organiser"],
        venue:r["Venue"],
        time:r["Start Time"],
        category:r["Category of the Event"],
        date:excelToDate(r["Date of the Event"])
      }));
      const clubs=[...new Set(allEvents.map(e=>e.organiser).filter(Boolean))];
      const cats=[...new Set(allEvents.map(e=>e.category).filter(Boolean))];
      clubFilter.innerHTML='<option value="">All Clubs</option>'+clubs.map(c=>`<option>${c}</option>`).join('');
      catFilter.innerHTML='<option value="">All Categories</option>'+cats.map(c=>`<option>${c}</option>`).join('');
      render();
    }
  });

  q.oninput=dateFilter.onchange=clubFilter.onchange=catFilter.onchange=render;

  /* ✅ Clear button logic restored */
  clearBtn.onclick=()=>{
    q.value="";
    dateFilter.value="";
    clubFilter.value="";
    catFilter.value="";
    render();
  };

  upcomingBtn.onclick=()=>{
    mode="upcoming";
    upcomingBtn.classList.add("active");
    pastBtn.classList.remove("active");
    render();
  };
  pastBtn.onclick=()=>{
    mode="past";
    pastBtn.classList.add("active");
    upcomingBtn.classList.remove("active");
    render();
  };

});
</script>

</body>
</html>
