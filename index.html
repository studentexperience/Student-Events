<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PapaParse CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin: 12px 0 18px;
    }

    .toolbar {
      max-width: 1200px;
      margin: 0 auto 18px;
      display: grid;
      grid-template-columns: 1.6fr 1fr 1.1fr 1.1fr auto;
      gap: 10px;
      align-items: center;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d7d7d7;
      background: #fff;
      font-size: 14px;
    }

    .toolbar button {
      cursor: pointer;
      background: #111827;
      color: #fff;
      border: 1px solid #111827;
    }

    .toolbar button:hover {
      background: #0b1220;
    }

    .hint {
      max-width: 1200px;
      margin: 0 auto 14px;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    .events-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: auto;
    }

    .event-card {
      background: #fffbea;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }

    .event-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .event-meta {
      font-size: 14px;
      margin: 4px 0;
      color: #333;
    }

    .tag {
      display: inline-block;
      background: #e0e0e0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 6px;
    }

    .empty {
      text-align: center;
      color: #444;
      margin-top: 26px;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
      .toolbar button {
        grid-column: span 2;
      }
    }
  </style>
</head>

<body>

<h1>Upcoming Student Events</h1>

<div class="toolbar">
  <input id="q" type="text" placeholder="🔍 Search by event, club, category, or venue…" />
  <input id="dateFilter" type="date" title="Pick a date" />
  <select id="clubFilter"></select>
  <select id="catFilter"></select>
  <button id="clearBtn" type="button">Clear</button>
</div>

<div class="hint">
  Use any combination of search, date, club, or activity type to discover events.
</div>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;"></div>

<script>
  const csvUrl = "website-data.csv";

  const ALL_CLUBS = [
    "ACC MC - Undergraduate",
    "ACC SONAM - Graduate",
    "ACC SONAM - Undergraduate",
    "ACCs FAS",
    "Activity Club IED",
    "AKU Athletics Club",
    "AKU Chess Club",
    "AKU Graduate Education Student Society (AGESS)",
    "AKU Journalism Club",
    "AKU Majlis",
    "AKU MUN",
    "AKU Photography Club",
    "Arts and Culture Committee (AAC) (AKU-FAS)",
    "Arts and Culture Committee (AAC) (AKU-IED)",
    "Arts and Culture Committee (AAC) (AKU-SONAM) Graduate",
    "Arts and Culture Committee (AAC) (AKU-SONAM) Undergraduate",
    "Arts and Culture Committee (ACC) (AKU-MC)",
    "Aurora",
    "Class Representative",
    "Club for Theatrics (ACT)",
    "Entrepreneurial Society (AES)",
    "Explorers Club",
    "FALAH (FAS)",
    "FALAH (MBBS)",
    "FALAH (SONAM)",
    "Music Society",
    "OSEP Internal",
    "Public Speaking Forum (PSF)",
    "Publication and Literary Society (APLS) (FAS)",
    "Publication and Literary Society (APLS) (MBBS)",
    "Publication and Literary Society (APLS) (SONAM)",
    "Rowing Club (ARC)",
    "Society for Arts and Culture",
    "Society of Climate Conservation and Health (SoCCH)",
    "Sports Society",
    "Student Research Forum (SRF) (FAS)",
    "Student Research Forum (SRF) (MBBS)",
    "Student Research Forum (SRF) (SONAM)",
    "SRF-FAS Conference",
    "Synergy (FAS)",
    "Synergy (MBBS)",
    "Synergy (SONAM)"
  ];

  const ALL_CATEGORIES = [
    "Competition",
    "Meeting",
    "Orientation",
    "Other",
    "Recreational/Social",
    "Sports",
    "Welfare",
    "Workshop/Session"
  ];

  let allEvents = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  function excelToDate(n) {
    const d = new Date((Number(n) - 25569) * 86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function render() {
    const q = qEl.value.trim().toLowerCase();
    const club = clubFilter.value;
    const cat = catFilter.value;
    const dateVal = dateFilter.value;

    let selectedDate = dateVal ? new Date(dateVal + "T00:00:00") : null;

    const filtered = allEvents
      .filter(e => e.date >= today)
      .filter(e => !club || e.organiser === club)
      .filter(e => !cat || e.category === cat)
      .filter(e => !selectedDate || e.date.getTime() === selectedDate.getTime())
      .filter(e => !q || `${e.name} ${e.organiser} ${e.category} ${e.venue}`.toLowerCase().includes(q))
      .sort((a,b) => a.date - b.date);

    events.innerHTML = "";
    emptyMsg.style.display = "none";

    if (filtered.length === 0) {
      emptyMsg.style.display = "block";

      if (club) {
        emptyMsg.innerHTML = "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)";
      } else if (cat) {
        emptyMsg.innerHTML = "💡 Don't see any relevant event? How about you bring the event, and OSEP would love to support you in planning and execution of the event.";
      } else {
        emptyMsg.innerHTML = "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)";
      }
      return;
    }

    filtered.forEach(e => {
      events.insertAdjacentHTML("beforeend", `
        <div class="event-card">
          <div class="event-title">${e.name}</div>
          <div class="event-meta">📅 ${e.date.toDateString()}</div>
          <div class="event-meta">⏰ ${e.startTime}</div>
          <div class="event-meta">📍 ${e.venue}</div>
          <div class="event-meta">🏷 ${e.organiser}</div>
          <span class="tag">${e.category}</span>
        </div>
      `);
    });
  }

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete(res) {
      allEvents = res.data.map(r => ({
        organiser: r["Organiser"] || "",
        name: r["Event Name"] || "",
        category: r["Category of the Event"] || "",
        date: excelToDate(r["Date of the Event"]),
        startTime: r["Start Time"] || "",
        venue: r["Venue"] || ""
      })).filter(e => e.name && e.date);

      clubFilter.innerHTML = `<option value="">🏷️ Choose a club or society</option>` +
        ALL_CLUBS.map(c => `<option>${c}</option>`).join("");

      catFilter.innerHTML = `<option value="">🎯 Choose an activity type</option>` +
        ALL_CATEGORIES.map(c => `<option>${c}</option>`).join("");

      qEl.oninput = dateFilter.onchange = clubFilter.onchange = catFilter.onchange = render;
      clearBtn.onclick = () => { qEl.value = dateFilter.value = clubFilter.value = catFilter.value = ""; render(); };

      render();
    }
  });

  const qEl = document.getElementById("q");
  const dateFilter = document.getElementById("dateFilter");
  const clubFilter = document.getElementById("clubFilter");
  const catFilter = document.getElementById("catFilter");
  const clearBtn = document.getElementById("clearBtn");
  const events = document.getElementById("events");
  const emptyMsg = document.getElementById("emptyMsg");
</script>

</body>
</html>
