<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upcoming Student Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}

h1 {
  text-align:center;
  margin-bottom:14px;
}

/* ===== SEARCH / FILTER BAR ===== */
.toolbar {
  max-width:1200px;
  margin:0 auto 20px;
  display:grid;
  grid-template-columns: 2fr 1fr 1.2fr 1.2fr auto;
  gap:10px;
}

.toolbar input,
.toolbar select,
.toolbar button {
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #d0d0d0;
  font-size:14px;
  background:#fff;
}

.toolbar button {
  background:#111827;
  color:#fff;
  cursor:pointer;
}

.toolbar button:hover { background:#0b1220; }

@media (max-width: 900px) {
  .toolbar {
    grid-template-columns: 1fr 1fr;
  }
  .toolbar button {
    grid-column: span 2;
  }
}

/* ===== GRID ===== */
.events-container {
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap:18px;
}

/* ===== CARD ===== */
.event-card {
  border-radius:14px;
  padding:16px;
  box-shadow:0 6px 16px rgba(0,0,0,0.12);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* Soft inclusive colors */
.bg-0{background:#F0F7FF;}
.bg-1{background:#F7F3FF;}
.bg-2{background:#FFF6EC;}
.bg-3{background:#F1FAF5;}
.bg-4{background:#FFF0F3;}
.bg-5{background:#F5F5F5;}

/* ===== TEXT ===== */
.event-date {
  font-size:13px;
  font-weight:bold;
  margin-bottom:6px;
}

.event-title {
  font-size:16px;
  font-weight:bold;
  margin-bottom:6px;
}

.event-meta {
  font-size:14px;
  margin:3px 0;
  color:#333;
}

.category {
  display:inline-block;
  margin-top:10px;
  font-size:12px;
  background:rgba(0,0,0,0.08);
  padding:4px 10px;
  border-radius:20px;
}

/* ===== EMPTY ===== */
.empty {
  text-align:center;
  margin-top:30px;
  font-size:15px;
  color:#444;
}
</style>
</head>

<body>

<h1>Upcoming Student Events</h1>

<div class="toolbar">
  <input id="q" placeholder="🔍 Search by event, club, category, venue…" />
  <input id="dateFilter" type="date" />
  <select id="clubFilter"></select>
  <select id="catFilter"></select>
  <button id="clearBtn">Clear</button>
</div>

<div class="events-container" id="events"></div>
<div class="empty" id="emptyMsg" style="display:none;"></div>

<script>
const csvUrl = "website-data.csv";

const ALL_CLUBS = [
  "ACC MC - Undergraduate","ACC SONAM - Graduate","ACC SONAM - Undergraduate",
  "ACCs FAS","Activity Club IED","AKU Athletics Club","AKU Chess Club",
  "AKU Graduate Education Student Society (AGESS)","AKU Journalism Club",
  "AKU Majlis","AKU MUN","AKU Photography Club",
  "Arts and Culture Committee (AAC) (AKU-FAS)",
  "Arts and Culture Committee (AAC) (AKU-IED)",
  "Arts and Culture Committee (AAC) (AKU-SONAM) Graduate",
  "Arts and Culture Committee (AAC) (AKU-SONAM) Undergraduate",
  "Arts and Culture Committee (ACC) (AKU-MC)",
  "Aurora","Class Representative","Club for Theatrics (ACT)",
  "Entrepreneurial Society (AES)","Explorers Club",
  "FALAH (FAS)","FALAH (MBBS)","FALAH (SONAM)",
  "Music Society","OSEP Internal","Public Speaking Forum (PSF)",
  "Publication and Literary Society (APLS) (FAS)",
  "Publication and Literary Society (APLS) (MBBS)",
  "Publication and Literary Society (APLS) (SONAM)",
  "Rowing Club (ARC)","Society for Arts and Culture",
  "Society of Climate Conservation and Health (SoCCH)",
  "Sports Society","Student Research Forum (SRF) (FAS)",
  "Student Research Forum (SRF) (MBBS)",
  "Student Research Forum (SRF) (SONAM)",
  "SRF-FAS Conference","Synergy (FAS)","Synergy (MBBS)","Synergy (SONAM)"
];

const ALL_CATEGORIES = [
  "Competition","Meeting","Orientation","Other",
  "Recreational/Social","Sports","Welfare","Workshop/Session"
];

const today = new Date(); today.setHours(0,0,0,0);
const COLOR_COUNT = 6;
let allEvents = [];

const excelToDate = n => {
  const d = new Date((Number(n)-25569)*86400000);
  d.setHours(0,0,0,0);
  return d;
};

function render(){
  const qv = q.value.toLowerCase();
  const cv = clubFilter.value;
  const tv = catFilter.value;
  const dv = dateFilter.value ? new Date(dateFilter.value+"T00:00:00") : null;

  const filtered = allEvents
    .filter(e => e.date >= today)
    .filter(e => !cv || e.organiser===cv)
    .filter(e => !tv || e.category===tv)
    .filter(e => !dv || e.date.getTime()===dv.getTime())
    .filter(e => !qv || `${e.name} ${e.organiser} ${e.category} ${e.venue}`.toLowerCase().includes(qv))
    .sort((a,b)=>a.date-b.date);

  events.innerHTML="";
  emptyMsg.style.display="none";

  if(!filtered.length){
    emptyMsg.style.display="block";
    emptyMsg.innerHTML = cv
      ? "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)"
      : tv
      ? "💡 Don't see any relevant event? How about you bring the event and OSEP would love to support you in planning and execution of the event."
      : "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)";
    return;
  }

  filtered.forEach((e,i)=>{
    const orgHTML   = e.organiser ? `<div class="event-meta">🎭 ${e.organiser}</div>` : "";
    const venueHTML= e.venue ? `<div class="event-meta">📍 ${e.venue}</div>` : "";
    const timeHTML = e.time ? `<div class="event-meta">⏰ ${e.time}</div>` : "";

    events.insertAdjacentHTML("beforeend",`
      <div class="event-card bg-${i % COLOR_COUNT}">
        <div class="event-date">📅 ${e.date.toDateString()}</div>
        <div class="event-title">${e.name}</div>
        ${orgHTML}
        ${venueHTML}
        ${timeHTML}
        <div class="category">${e.category}</div>
      </div>
    `);
  });
}

Papa.parse(csvUrl,{
  download:true,header:true,skipEmptyLines:true,
  complete:r=>{
    allEvents = r.data.map(x=>({
      name:x["Event Name"],
      organiser:x["Organiser"],
      category:x["Category of the Event"],
      venue:x["Venue"]||"",
      time:x["Start Time"]||"",
      date:excelToDate(x["Date of the Event"])
    })).filter(e=>e.name && e.date);

    clubFilter.innerHTML=`<option value="">🎭 Choose a club or society</option>` +
      ALL_CLUBS.map(c=>`<option>${c}</option>`).join("");
    catFilter.innerHTML=`<option value="">🎯 Choose an activity type</option>` +
      ALL_CATEGORIES.map(c=>`<option>${c}</option>`).join("");

    q.oninput=dateFilter.onchange=clubFilter.onchange=catFilter.onchange=render;
    clearBtn.onclick=()=>{q.value=dateFilter.value=clubFilter.value=catFilter.value="";render();};

    render();
  }
});

const q=document.getElementById("q"),
      dateFilter=document.getElementById("dateFilter"),
      clubFilter=document.getElementById("clubFilter"),
      catFilter=document.getElementById("catFilter"),
      clearBtn=document.getElementById("clearBtn"),
      events=document.getElementById("events"),
      emptyMsg=document.getElementById("emptyMsg");
</script>

</body>
</html>
