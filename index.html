<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campus Life · Events</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --ink:#111827;
  --bg:#f3f4f6;
  --panel:#ffffff;
  --border:#e5e7eb;
  --shadow:0 10px 22px rgba(0,0,0,.14);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* ===== Header ===== */
.topbar{
  height:56px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 18px;
  font-weight:600;
}

/* ===== Layout ===== */
.shell{
  display:grid;
  grid-template-columns:180px 1fr;
  min-height:calc(100vh - 56px);
}

/* ===== Side Nav (unchanged) ===== */
.nav{
  background:#fff;
  border-right:1px solid var(--border);
  padding:14px 10px;
}
.nav a{
  display:block;
  padding:10px 12px;
  margin:4px 0;
  border-radius:10px;
  text-decoration:none;
  color:#111;
}
.nav a.active{
  background:#eef2ff;
  font-weight:600;
}

/* ===== Content ===== */
.content{ padding:22px; }
.page-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

/* ===== Page grid ===== */
.page-grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:22px;
}

/* ===== Filters (UNCHANGED) ===== */
.filters{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
}
.filters h3{ margin-bottom:16px; }
.field{ margin-bottom:16px; }
.field label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}
.field input,
.field select{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-family:'Poppins',sans-serif;
}

.toggle{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}
.toggle button{
  flex:1;
  border:none;
  border-radius:999px;
  padding:10px;
  font-weight:600;
  background:#e5e7eb;
  cursor:pointer;
}
.toggle button.active{
  background:#111827;
  color:#fff;
}

/* ===== Cards Grid (WIDTH ↑ ~1.5×) ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));
  gap:28px;
}

/* ===== Event Card ===== */
.card{
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  min-height:420px; /* HEIGHT ↑ ~1.2× */
}

/* ✅ Cover image space */
.card-cover{
  height:160px;
  background:linear-gradient(135deg,#dbeafe,#e0e7ff);
  background-size:cover;
  background-position:center;
}

/* Card body */
.card-body{
  padding:22px 20px 18px;
  display:flex;
  flex-direction:column;
  flex:1;
}

/* Event title */
.card-title{
  font-size:18px;
  font-weight:700;
  line-height:1.4;
  margin-bottom:18px; /* two line space */
}

/* Meta info */
.card-meta{
  font-size:15px;
  margin:6px 0;
}

/* Organizer banner */
.organizer{
  margin-top:auto;
  padding:12px 14px;
  background:rgba(0,0,0,.06);
  border-radius:14px;
  font-size:13.5px;
  font-weight:600;
}

/* ===== Responsive ===== */
@media(max-width:1400px){
  .cards{ grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); }
}
@media(max-width:1100px){
  .page-grid{ grid-template-columns:1fr; }
  .cards{ grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); }
}
@media(max-width:700px){
  .shell{ grid-template-columns:1fr; }
  .nav{ display:none; }
  .cards{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header class="topbar">Campus Life</header>

<div class="shell">
  <nav class="nav">
    <a href="#">Home</a>
    <a href="#" class="active">Events</a>
    <a href="#">Clubs</a>
    <a href="#">News</a>
    <a href="#">Forms</a>
  </nav>

  <main class="content">
    <div class="page-title">Events</div>

    <div class="page-grid">
      <aside class="filters">
        <h3>Search Events</h3>

        <div class="toggle">
          <button id="upcomingBtn" class="active">Upcoming</button>
          <button id="pastBtn">Past</button>
        </div>

        <div class="field"><label>Search</label><input id="q"></div>
        <div class="field"><label>Date</label><input id="dateFilter" type="date"></div>
        <div class="field"><label>Club</label><select id="clubFilter"></select></div>
        <div class="field"><label>Category</label><select id="catFilter"></select></div>
      </aside>

      <section class="cards" id="events"></section>
    </div>
  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

  const csvUrl="website-data.csv";
  const today=new Date(); today.setHours(0,0,0,0);
  let mode="upcoming", allEvents=[];

  const eventsEl=document.getElementById("events");
  const upcomingBtn=document.getElementById("upcomingBtn");
  const pastBtn=document.getElementById("pastBtn");

  function excelToDate(v){
    const d=new Date((Number(v)-25569)*86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function render(){
    let list=allEvents.filter(e=> mode==="upcoming"? e.date>=today : e.date<today);
    list.sort((a,b)=> mode==="upcoming"? a.date-b.date : b.date-a.date);

    eventsEl.innerHTML="";
    list.forEach(e=>{
      eventsEl.insertAdjacentHTML("beforeend",`
        <article class="card">
          <div class="card-cover"></div>
          <div class="card-body">
            <div class="card-title">${e.name}</div>
            <div class="card-meta">📅 ${e.date.toDateString()}</div>
            ${e.time?`<div class="card-meta">⏰ ${e.time}</div>`:""}
            ${e.venue?`<div class="card-meta">📍 ${e.venue}</div>`:""}
            <div class="organizer">🎭 ${e.organiser}</div>
          </div>
        </article>
      `);
    });
  }

  Papa.parse(csvUrl,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:res=>{
      allEvents=res.data.map(r=>({
        name:r["Event Name"],
        organiser:r["Organiser"],
        venue:r["Venue"],
        time:r["Start Time"],
        date:excelToDate(r["Date of the Event"])
      })).filter(e=>e.name && e.date);
      render();
    }
  });

  upcomingBtn.onclick=()=>{ mode="upcoming"; upcomingBtn.classList.add("active"); pastBtn.classList.remove("active"); render(); }
  pastBtn.onclick=()=>{ mode="past"; pastBtn.classList.add("active"); upcomingBtn.classList.remove("active"); render(); }

});
</script>

</body>
</html>
``
