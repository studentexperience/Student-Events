<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Life · Events</title>

  <!-- Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --bg:#f3f4f6;
      --panel:#ffffff;
      --shadow:0 6px 14px rgba(0,0,0,.10);

      /* inclusive pastel palette */
      --b1:#F0F7FF; --a1:#D6E6FF;
      --b2:#F7F3FF; --a2:#E3DBFF;
      --b3:#FFF6EC; --a3:#FFE6CC;
      --b4:#F1FAF5; --a4:#D9F2E6;
      --b5:#FFF0F3; --a5:#FFD6DE;
      --b6:#F5F5F5; --a6:#E1E1E1;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    /* ===== Top header ===== */
    .topbar{
      height:56px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      padding:0 18px;
      gap:12px;
    }
    .brand{
      font-weight:600;
      letter-spacing:.2px;
    }

    /* ===== Main layout: left nav + content ===== */
    .shell{
      display:grid;
      grid-template-columns: 180px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* Left navigation */
    .nav{
      background:var(--panel);
      border-right:1px solid var(--border);
      padding:14px 10px;
    }
    .nav a{
      display:block;
      padding:10px 12px;
      margin:4px 0;
      border-radius:10px;
      color:#111;
      text-decoration:none;
      font-size:14px;
    }
    .nav a:hover{ background:#f3f4f6; }
    .nav a.active{
      background:#eef2ff;
      color:#1f2a64;
      font-weight:600;
    }

    /* Content area */
    .content{
      padding:22px;
    }

    .page-title{
      font-size:28px;
      font-weight:700;
      margin:6px 0 18px;
    }

    /* ===== Two-column content: filters + cards ===== */
    .page-grid{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:18px;
      align-items:start;
    }

    /* Filter panel */
    .filters{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow: var(--shadow);
      padding:16px;
      position:sticky;
      top:16px;
    }

    .filter-title{
      font-size:14px;
      font-weight:600;
      margin:2px 0 14px;
      color:#111;
    }

    .field{
      margin:0 0 14px;
    }
    .field label{
      display:block;
      font-size:13px;
      color:#111;
      font-weight:600;
      margin-bottom:6px;
    }
    .field input,
    .field select{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #d1d5db;
      font-family:'Poppins',sans-serif;
      font-size:14px;
      background:#fff;
    }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:4px;
    }
    .btn{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--ink);
      background:var(--ink);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-family:'Poppins',sans-serif;
      font-size:14px;
    }
    .btn.secondary{
      background:#fff;
      color:var(--ink);
      border:1px solid #d1d5db;
      font-weight:600;
    }

    /* Toggle (Upcoming / Past) */
    .toggle{
      display:flex;
      gap:10px;
      margin:6px 0 14px;
    }
    .pill{
      flex:1;
      border:none;
      border-radius:999px;
      padding:8px 10px;
      cursor:pointer;
      background:#e5e7eb;
      font-family:'Poppins',sans-serif;
      font-weight:600;
      font-size:13px;
    }
    .pill.active{
      background:var(--ink);
      color:#fff;
    }

    /* =============================================
       CARDS GRID
       Desktop (≥1280px): 4 columns
       Laptop  (≥1024px): 3 columns
       Tablet  (≥640px) : 2 columns
       Mobile  (<640px) : 1 column
    ============================================= */
    .cards{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:18px;
    }

    .empty{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      color:#444;
      box-shadow: var(--shadow);
      font-size:14px;
    }

    /* =============================================
       CARD LAYOUT (redesigned)
       Structure:
         .cover-img   – image placeholder at top
         .body        – content (padded, 1.2× taller)
           .title     – bold event name
           .spacer    – two line-spaces gap
           .meta      – date, time, venue
         .organizer-banner – sticky bottom strip
    ============================================= */
    .card{
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      background:var(--panel);
    }

    /* Cover image area */
    .cover-img{
      width:100%;
      /* 1.2× height factor applied here too: base ~160px × 1.2 = ~192px */
      height:192px;
      object-fit:cover;
      display:block;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      flex-shrink:0;
    }

    /* Placeholder shown when no image URL is available */
    .cover-placeholder{
      width:100%;
      height:192px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      letter-spacing:2px;
      opacity:0.55;
    }

    /* Animated shimmer while AI fetches the image */
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }
    .cover-shimmer {
      opacity: 1 !important;
      background-image: linear-gradient(
        90deg,
        rgba(255,255,255,0)   0%,
        rgba(255,255,255,0.45) 50%,
        rgba(255,255,255,0)   100%
      ) !important;
      background-size: 800px 100% !important;
      animation: shimmer 1.6s infinite linear;
      position: relative;
    }
    .cover-shimmer .shimmer-icon {
      position: relative;
      z-index: 1;
      font-size: 36px;
      opacity: 0.5;
    }

    /* Body: 1.2× padding (original ~12px 14px 14px → ~14px 17px 17px) */
    .body{
      padding:14px 17px 17px;
      flex:1;
      display:flex;
      flex-direction:column;
    }

    /* Bold event name */
    .title{
      font-size:15.5px;
      font-weight:700;
      margin:0 0 0;
      line-height:1.35;
    }

    /* Two line-spaces gap between title and meta */
    .title-gap{
      height:2em; /* two line-space equivalent */
    }

    /* Date / time / venue lines */
    .meta{
      font-size:13.5px;
      margin:3px 0;
      line-height:1.35;
      color:#333;
      display:flex;
      align-items:flex-start;
      gap:5px;
    }
    .meta-icon{
      flex-shrink:0;
      margin-top:1px;
    }

    /* Category chip (kept for reference, hidden in new layout — remove if unwanted) */
    .chip{
      margin-top:10px;
      font-size:11.5px;
      background:rgba(0,0,0,.07);
      padding:3px 10px;
      border-radius:999px;
      align-self:flex-start;
      font-weight:500;
    }

    /* =============================================
       ORGANIZER BANNER — bottom of card
    ============================================= */
    .organizer-banner{
      padding:9px 17px;
      font-size:12px;
      font-weight:600;
      letter-spacing:.2px;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex-shrink:0;
    }

    /* =============================================
       MOBILE NAV TOGGLE (hamburger)
    ============================================= */
    .nav-toggle{
      display:none;
      background:none;
      border:none;
      cursor:pointer;
      padding:4px 6px;
      font-size:22px;
      line-height:1;
      color:var(--ink);
    }

    /* Mobile filter toggle button */
    .filter-toggle{
      display:none;
      width:100%;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--panel);
      font-family:'Poppins',sans-serif;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      text-align:left;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    /* =============================================
       RESPONSIVE BREAKPOINTS
       1280px+ : 4 cards  (large desktop)
       1024px  : 3 cards  (laptop / small desktop)
        768px  : 2 cards  (tablet landscape + portrait)
        480px  : 1 card   (phone)
    ============================================= */

    /* Laptop / small desktop */
    @media (max-width: 1280px){
      .cards{ grid-template-columns: repeat(3, 1fr); }
    }

    /* Tablet landscape — side nav collapses into topbar */
    @media (max-width: 1024px){
      .shell{ grid-template-columns: 1fr; }
      .nav{
        display:none;
        position:fixed;
        top:56px; left:0;
        width:200px;
        height:calc(100vh - 56px);
        z-index:200;
        box-shadow:4px 0 16px rgba(0,0,0,.12);
        overflow-y:auto;
      }
      .nav.open{ display:block; }
      .nav-toggle{ display:block; }
      .content{ padding:18px; }
      .page-grid{ grid-template-columns: 260px 1fr; }
      .cards{ grid-template-columns: repeat(2, 1fr); }
    }

    /* Tablet portrait */
    @media (max-width: 860px){
      .page-grid{ grid-template-columns: 1fr; }
      .filters{
        position:relative;
        top:auto;
      }
      /* Filter panel collapsible on tablet/mobile */
      .filter-toggle{ display:block; }
      .filters-inner{ display:none; }
      .filters-inner.open{ display:block; }
      .cards{ grid-template-columns: repeat(2, 1fr); }
    }

    /* Phone */
    @media (max-width: 540px){
      .content{ padding:12px; }
      .page-title{ font-size:22px; margin-bottom:12px; }
      .cards{
        grid-template-columns: 1fr;
        gap:14px;
      }
      .cover-img,
      .cover-placeholder{ height:160px; }
      .organizer-banner{ font-size:11.5px; padding:8px 14px; }
    }

    /* Very small phones */
    @media (max-width: 360px){
      .topbar{ padding:0 12px; }
      .brand{ font-size:14px; }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">&#9776;</button>
    <div class="brand">Campus Life</div>
  </header>

  <div class="shell">
    <!-- Left navigation -->
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#" class="active">Events</a>
      <a href="#">Clubs</a>
      <a href="#">News</a>
      <a href="#">Forms</a>
    </nav>

    <!-- Main content -->
    <main class="content">
      <div class="page-title">Events</div>

      <div class="page-grid">
        <!-- Filters -->
        <aside class="filters">
          <button class="filter-toggle" id="filterToggle" type="button">🔍 Search &amp; Filter ▾</button>
          <div class="filters-inner" id="filtersInner">
          <div class="filter-title">Search Events</div>

          <div class="toggle">
            <button id="upcomingBtn" class="pill active" type="button">Upcoming</button>
            <button id="pastBtn" class="pill" type="button">Past</button>
          </div>

          <div class="field">
            <label for="q">Search</label>
            <input id="q" type="text" placeholder="Search…" />
          </div>

          <div class="field">
            <label for="dateFilter">Date</label>
            <input id="dateFilter" type="date" />
          </div>

          <div class="field">
            <label for="clubFilter">Club</label>
            <select id="clubFilter"></select>
          </div>

          <div class="field">
            <label for="catFilter">Category</label>
            <select id="catFilter"></select>
          </div>

          <div class="btn-row">
            <button id="clearBtn" class="btn secondary" type="button">Clear</button>
          </div><!-- /.btn-row -->
          </div><!-- /.filters-inner -->
        </aside>

        <!-- Cards -->
        <section>
          <div id="emptyMsg" class="empty" style="display:none;"></div>
          <div id="events" class="cards"></div>
        </section>
      </div>
    </main>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ---- Nav & filter toggles ---- */
  const navToggle    = document.getElementById("navToggle");
  const nav          = document.querySelector(".nav");
  const filterToggle = document.getElementById("filterToggle");
  const filtersInner = document.getElementById("filtersInner");

  navToggle.addEventListener("click", () => nav.classList.toggle("open"));

  document.addEventListener("click", (e) => {
    if(nav.classList.contains("open") &&
       !nav.contains(e.target) && e.target !== navToggle){
      nav.classList.remove("open");
    }
  });

  filterToggle.addEventListener("click", () => {
    const isOpen = filtersInner.classList.toggle("open");
    filterToggle.textContent = isOpen ? "🔍 Search & Filter ▴" : "🔍 Search & Filter ▾";
  });

  const mq = window.matchMedia("(max-width: 860px)");
  if(!mq.matches){ filtersInner.classList.add("open"); }
  mq.addEventListener("change", (e) => {
    if(!e.matches) filtersInner.classList.add("open");
  });

  /* ---- CSV / events logic ---- */
  const csvUrl = "website-data.csv";

  const today = new Date();
  today.setHours(0,0,0,0);

  let mode = "upcoming";
  let allEvents = [];

  const PALETTE = [
    {base:getCss('--b1'), accent:getCss('--a1')},
    {base:getCss('--b2'), accent:getCss('--a2')},
    {base:getCss('--b3'), accent:getCss('--a3')},
    {base:getCss('--b4'), accent:getCss('--a4')},
    {base:getCss('--b5'), accent:getCss('--a5')},
    {base:getCss('--b6'), accent:getCss('--a6')},
  ];

  // Accent colours used for the organizer banner background
  const BANNER_COLORS = [
    '#4f7cff','#7c5cbf','#e07b39','#2a9d6f','#c94f6a','#555555'
  ];

  const ALL_CLUBS = [
    "ACC MC - Undergraduate","ACC SONAM - Graduate","ACC SONAM - Undergraduate","ACCs FAS","Activity Club IED",
    "AKU Athletics Club","AKU Chess Club","AKU Graduate Education Student Society (AGESS)","AKU Journalism Club",
    "AKU Majlis","AKU MUN","AKU Photography Club","Arts and Culture Committee (AAC) (AKU-FAS)",
    "Arts and Culture Committee (AAC) (AKU-IED)","Arts and Culture Committee (AAC) (AKU-SONAM) Graduate",
    "Arts and Culture Committee (AAC) (AKU-SONAM) Undergraduate","Arts and Culture Committee (ACC) (AKU-MC)",
    "Aurora","Class Representative","Club for Theatrics (ACT)","Entrepreneurial Society (AES)","Explorers Club",
    "FALAH (FAS)","FALAH (MBBS)","FALAH (SONAM)","Music Society","OSEP Internal","Public Speaking Forum (PSF)",
    "Publication and Literary Society (APLS) (FAS)","Publication and Literary Society (APLS) (MBBS)",
    "Publication and Literary Society (APLS) (SONAM)","Rowing Club (ARC)","Society for Arts and Culture",
    "Society of Climate Conservation and Health (SoCCH)","Sports Society","Student Research Forum (SRF) (FAS)",
    "Student Research Forum (SRF) (MBBS)","Student Research Forum (SRF) (SONAM)","SRF-FAS Conference",
    "Synergy (FAS)","Synergy (MBBS)","Synergy (SONAM)"
  ].slice().sort();

  const ALL_CATEGORIES = [
    "Competition","Meeting","Orientation","Other","Recreational/Social","Sports","Welfare","Workshop/Session"
  ].slice().sort();

  // DOM refs
  const q           = document.getElementById("q");
  const dateFilter  = document.getElementById("dateFilter");
  const clubFilter  = document.getElementById("clubFilter");
  const catFilter   = document.getElementById("catFilter");
  const clearBtn    = document.getElementById("clearBtn");
  const eventsEl    = document.getElementById("events");
  const emptyMsg    = document.getElementById("emptyMsg");
  const upcomingBtn = document.getElementById("upcomingBtn");
  const pastBtn     = document.getElementById("pastBtn");

  // Excel serial date -> JS date
  function excelToDate(v){
    const d = new Date((Number(v) - 25569) * 86400000);
    d.setHours(0,0,0,0);
    return d;
  }

  function buildDropdown(el, placeholder, list){
    el.innerHTML = `<option value="">${placeholder}</option>` +
      list.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join("");
  }

  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getCss(varName){
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }

  function sameDay(d1, d2){ return d1 && d2 && d1.getTime() === d2.getTime(); }

  // Format a JS Date as "Mon DD, YYYY"
  function formatDate(d){
    if(!d) return "";
    return d.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  }

  function render(){
    const qv = q.value.trim().toLowerCase();
    const cv = clubFilter.value;
    const tv = catFilter.value;
    const dv = dateFilter.value ? new Date(dateFilter.value + "T00:00:00") : null;

    let list = allEvents.filter(e => mode === "upcoming" ? e.date >= today : e.date < today);

    list = list
      .filter(e => !cv || e.organiser === cv)
      .filter(e => !tv || e.category === tv)
      .filter(e => !dv || sameDay(e.date, dv))
      .filter(e => !qv || `${e.name} ${e.organiser} ${e.category} ${e.venue} ${e.time}`.toLowerCase().includes(qv));

    list.sort((a,b) => mode === "upcoming" ? a.date - b.date : b.date - a.date);

    eventsEl.innerHTML = "";
    emptyMsg.style.display = "none";

    if(!list.length){
      emptyMsg.style.display = "block";
      if(cv){
        emptyMsg.textContent = "✨ Looks like our clubs and societies are taking a short break before the fun begins again :-)";
      } else if(tv){
        emptyMsg.textContent = "💡 Don't see any relevant event? How about you bring the event and OSEP would love to support you in planning and execution of the event.";
      } else {
        emptyMsg.textContent = mode === "upcoming" ? "No upcoming events to show." : "No past events to show.";
      }
      return;
    }

    list.forEach((e, i) => {
      const {base, accent} = PALETTE[i % PALETTE.length];
      const bannerColor    = BANNER_COLORS[i % BANNER_COLORS.length];
      const cardId         = `card-${Date.now()}-${i}`;

      // Meta lines
      const dateLine  = e.date  ? `<div class="meta"><span class="meta-icon">📅</span>${escapeHtml(formatDate(e.date))}</div>` : "";
      const timeLine  = e.time  ? `<div class="meta"><span class="meta-icon">⏰</span>${escapeHtml(e.time)}</div>` : "";
      const venueLine = e.venue ? `<div class="meta"><span class="meta-icon">📍</span>${escapeHtml(e.venue)}</div>` : "";
      const bannerHtml = e.organiser
        ? `<div class="organizer-banner" style="background:${bannerColor};">🎭 ${escapeHtml(e.organiser)}</div>`
        : "";

      // Cover: real image → use it; missing → shimmer placeholder, then AI fills it
      const coverHtml = e.image
        ? `<img class="cover-img" src="${escapeHtml(e.image)}" alt="${escapeHtml(e.name)}" loading="lazy" />`
        : `<div class="cover-placeholder cover-shimmer" id="${cardId}" style="background:${accent};" data-title="${escapeHtml(e.name)}" data-category="${escapeHtml(e.category)}">
             <span class="shimmer-icon">🎓</span>
           </div>`;

      eventsEl.insertAdjacentHTML("beforeend", `
        <article class="card" style="background:${base}">
          ${coverHtml}
          <div class="body">
            <div class="title">${escapeHtml(e.name)}</div>
            <div class="title-gap"></div>
            ${dateLine}
            ${timeLine}
            ${venueLine}
            <div class="chip">${escapeHtml(e.category)}</div>
          </div>
          ${bannerHtml}
        </article>
      `);

      // For cards without an image, trigger AI keyword lookup then Unsplash fetch
      if(!e.image){
        fetchAICoverImage(cardId, e.name, e.category, accent);
      }
    });
  }

  /* ------------------------------------------------------------------ */
  /*  AI-powered cover image:                                            */
  /*  1. Claude writes a detailed image prompt for the event             */
  /*  2. Pollinations.ai generates an actual AI image from that prompt  */
  /*     (free, no API key, returns a real image URL)                   */
  /* ------------------------------------------------------------------ */

  const imgCache = {}; // { cacheKey -> imageUrl }

  async function fetchAICoverImage(cardId, eventTitle, category, fallbackColor){
    const cacheKey = eventTitle.toLowerCase().trim();

    try {
      /* ── Step 1: Ask Claude for a vivid image generation prompt ── */
      let imageUrl;
      if(imgCache[cacheKey]){
        imageUrl = imgCache[cacheKey];
      } else {
        const prompt =
          `You are helping a university student-events website auto-generate cover images. ` +
          `Write a SHORT image generation prompt (max 15 words) for this event: ` +
          `Title: "${eventTitle}", Category: "${category || "general"}". ` +
          `The image must look like a real photograph, be visually rich, university/campus-themed, ` +
          `and directly reflect what the event is about. ` +
          `Examples: ` +
          `"students competing in a chess tournament in a university hall", ` +
          `"university rowing team training on a river at sunrise", ` +
          `"students performing on a lit stage at a music concert". ` +
          `Reply with ONLY the prompt, nothing else.`;

        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 60,
            messages: [{ role: "user", content: prompt }]
          })
        });

        const data    = await res.json();
        const aiPrompt = (data.content?.[0]?.text || `${eventTitle} university campus event`)
          .trim().replace(/['"]/g, "").substring(0, 200);

        // Pollinations.ai: free AI image generation, no key, returns image directly
        // width=800&height=420 matches our card cover dimensions
        imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(aiPrompt + ", photorealistic, bright lighting, high quality")}?width=800&height=420&nologo=true&seed=${hashStr(cacheKey)}`;
        imgCache[cacheKey] = imageUrl;
      }

      /* ── Step 2: Inject image into card ── */
      swapImage(cardId, imageUrl, eventTitle, cacheKey);

    } catch(err){
      // If Claude API fails, generate directly from event title
      const fallbackPrompt = `${eventTitle} ${category || ""} university campus event students`;
      const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fallbackPrompt + ", photorealistic, high quality")}?width=800&height=420&nologo=true&seed=${hashStr(cacheKey)}`;
      swapImage(cardId, imageUrl, eventTitle, cacheKey);
    }
  }

  function swapImage(cardId, imageUrl, altText, cacheKey){
    const placeholder = document.getElementById(cardId);
    if(!placeholder) return;

    const img      = new Image();
    img.onload     = () => {
      const el     = document.createElement("img");
      el.className = "cover-img";
      el.src       = imageUrl;
      el.alt       = altText;
      placeholder.replaceWith(el);
    };
    img.onerror    = () => {
      // Last resort: seeded Picsum
      const el     = document.createElement("img");
      el.className = "cover-img";
      el.src       = `https://picsum.photos/seed/${hashStr(cacheKey) % 500}/800/420`;
      el.alt       = altText;
      placeholder.replaceWith(el);
    };
    img.src = imageUrl;
  }

  // Simple deterministic hash → integer (for consistent seeds)
  function hashStr(str){
    let h = 0;
    for(let i = 0; i < str.length; i++){
      h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  }

  // Load CSV
  Papa.parse(csvUrl, {
    download:true,
    header:true,
    skipEmptyLines:true,
    complete: (res) => {
      allEvents = res.data.map(r => ({
        organiser: (r["Organiser"] || "").trim(),
        name:      (r["Event Name"] || "").trim(),
        category:  (r["Category of the Event"] || "").trim(),
        venue:     (r["Venue"] || "").trim(),
        time:      (r["Start Time"] || "").trim(),
        date:      excelToDate(r["Date of the Event"]),
        image:     (r["Cover Image"] || r["Image"] || r["cover_image"] || "").trim()
      })).filter(e => e.name && e.date);

      const clubsFromData = [...new Set(allEvents.map(e => e.organiser).filter(Boolean))];
      const catsFromData  = [...new Set(allEvents.map(e => e.category).filter(Boolean))];

      const mergedClubs = [...new Set([...ALL_CLUBS, ...clubsFromData])].sort();
      const mergedCats  = [...new Set([...ALL_CATEGORIES, ...catsFromData])].sort();

      buildDropdown(clubFilter, "All Clubs", mergedClubs);
      buildDropdown(catFilter, "All Categories", mergedCats);

      q.addEventListener("input", render);
      dateFilter.addEventListener("change", render);
      clubFilter.addEventListener("change", render);
      catFilter.addEventListener("change", render);

      clearBtn.addEventListener("click", () => {
        q.value = "";
        dateFilter.value = "";
        clubFilter.value = "";
        catFilter.value = "";
        render();
      });

      upcomingBtn.addEventListener("click", () => {
        mode = "upcoming";
        upcomingBtn.classList.add("active");
        pastBtn.classList.remove("active");
        render();
      });

      pastBtn.addEventListener("click", () => {
        mode = "past";
        pastBtn.classList.add("active");
        upcomingBtn.classList.remove("active");
        render();
      });

      render();
    }
  });

});
</script>
</body>
</html>
