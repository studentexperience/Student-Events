<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Campus Life" />
  <link rel="apple-touch-icon" href="https://studentexperience.github.io/icon-192.png" />
  <title>Campus Life · Emergency Contacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --ink:#111827; --muted:#6b7280; --border:#e5e7eb; --bg:#f3f4f6; --panel:#ffffff; --shadow:0 6px 14px rgba(0,0,0,.10); --accent:#2563eb; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { max-width:100%; overflow-x:hidden; }
    body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }

    .topbar { height:56px; background:linear-gradient(135deg,#1e40af 0%,#2563eb 60%,#3b82f6 100%); box-shadow:0 2px 12px rgba(37,99,235,.25); display:flex; align-items:center; padding:0 18px; gap:12px; position:sticky; top:0; z-index:100; }
    .brand { color:white; font-size:17px; font-weight:700; letter-spacing:.3px; }
    .nav-toggle { display:none; background:none; border:none; cursor:pointer; padding:4px 6px; font-size:22px; color:white; }

    .shell { display:grid; grid-template-columns:160px 1fr; min-height:calc(100vh - 56px); width:100%; max-width:100%; }
    .nav { background:var(--panel); border-right:1px solid var(--border); padding:16px 8px; width:160px; }
    .nav a { display:flex; align-items:center; gap:8px; padding:9px 12px; margin:2px 0; border-radius:10px; color:var(--ink); text-decoration:none; font-size:13px; font-weight:500; }
    .nav a:hover:not(.active) { background:#f9fafb; }
    .nav a.active { background:#eff6ff; color:#1d4ed8; font-weight:700; border-left:3px solid #2563eb; padding-left:9px; }

    .content { padding:22px; min-width:0; max-width:100%; overflow-x:hidden; }
    .page-title { font-size:28px; font-weight:700; margin:6px 0 4px; }
    .page-subtitle { font-size:14px; color:var(--muted); margin:0 0 20px; }

    /* Emergency banner */
    /* Emergency banner — stacks vertically on mobile */
    .emergency-banner {
      background:linear-gradient(135deg,#991b1b,#dc2626,#ef4444);
      color:white; padding:18px 16px; border-radius:12px; margin-bottom:18px;
      display:flex; flex-direction:column; align-items:center;
      gap:10px; text-align:center;
    }
    .emergency-banner-icon { font-size:30px; }
    .emergency-banner-text h2 { font-size:16px; font-weight:800; margin-bottom:3px; }
    .emergency-banner-text p { font-size:12px; opacity:.9; }
    .emergency-number {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:white; color:#dc2626; border-radius:14px;
      padding:12px 20px; text-align:center;
      text-decoration:none; box-shadow:0 4px 12px rgba(0,0,0,.2);
      width:100%; max-width:320px; box-sizing:border-box;
    }

    /* Search */
    #contactSearch { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-family:'Poppins',sans-serif; font-size:14px; background:white; box-shadow:var(--shadow); outline:none; box-sizing:border-box; }

    /* Filter chips — horizontal scroll on mobile */
    .filter-bar { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .filter-bar::-webkit-scrollbar { display:none; }
    .filter-chip { padding:6px 14px; border-radius:999px; border:2px solid var(--border); background:white; font-family:'Poppins',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; color:var(--muted); white-space:nowrap; flex-shrink:0; }
    .filter-chip.active { background:var(--accent); border-color:var(--accent); color:white; }

    /* Category */
    .category-section { margin-bottom:22px; }
    .category-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .category-label::after { content:""; flex:1; height:1px; background:var(--border); }

    /* Contact grid — 1 col always on mobile, 2+ on wider screens */
    .contacts-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    @media(min-width:500px){ .contacts-grid { grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); } }

    .contact-card { background:white; border-radius:10px; border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; }
    .contact-card-top { padding:12px 14px 10px; display:flex; align-items:center; gap:10px; }
    .contact-avatar { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .contact-name { font-size:13px; font-weight:700; margin-bottom:2px; }
    .contact-role { font-size:11px; color:var(--muted); }
    .contact-dept { font-size:11px; color:var(--muted); margin-top:1px; }
    .contact-actions { border-top:1px solid #f3f4f6; display:flex; }
    .contact-action { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:10px 6px; font-size:11px; font-weight:700; text-decoration:none; color:var(--muted); transition:background .15s; overflow:hidden; }
    .contact-action:hover { background:#f9fafb; }
    .contact-action.call { color:#16a34a; }
    .contact-action.email-btn { color:var(--accent); }
    .contact-action:not(:last-child) { border-right:1px solid #f3f4f6; }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); }

    /* Bottom nav */
    .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); box-shadow:0 -4px 12px rgba(0,0,0,.08); z-index:100; padding-bottom:env(safe-area-inset-bottom); }
    .bottom-nav-inner { display:flex; }
    .bottom-nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:7px 2px; font-size:9px; font-weight:600; color:var(--muted); text-decoration:none; gap:2px; }
    .bottom-nav-item span:first-child { font-size:18px; }
    .bottom-nav-item.active { color:var(--accent); }

    @media(max-width:768px){
      .shell { display:block; width:100%; }
      .content { width:100%; max-width:100%; }
      .nav { display:none; position:fixed; top:56px; left:0; width:200px; height:calc(100vh - 56px); z-index:99; box-shadow:4px 0 20px rgba(0,0,0,.1); background:white; }
      .nav.open { display:block; }
      .nav-toggle { display:block; }
      .bottom-nav { display:block; }
      .content { padding:12px 12px 80px; }
      .page-title { font-size:20px; }
      .page-subtitle { font-size:12px; margin-bottom:12px; }
    }
  </style>
</head>
<body>
<header class="topbar">
  <button class="nav-toggle" onclick="document.getElementById('sideNav').classList.toggle('open')">&#9776;</button>
  <div class="brand">Campus Life</div>
</header>

<div class="shell">
      <nav class="nav" id="sideNav">
      <a href="index.html">Home</a>
      <a href="index.html">Events</a>
      <a href="clubs.html">Clubs</a>
      <a href="acc.html">ACC</a>
      <a href="news.html">News</a>
      <a href="resources.html">Resources</a>
      <a href="emergency-contacts.html" class="active">Emergency</a>
      <a href="event-hub.html" style="color:#7c3aed;font-weight:700;">✦ Event Hub</a>
    </nav>

  <main class="content">
    <div class="page-title">🚨 Emergency Contacts</div>
    <div class="page-subtitle">Important contacts for emergencies on campus</div>

    <!-- Emergency Banner -->
    <div class="emergency-banner" id="emergencyBanner">
      <div class="emergency-banner-icon">🚨</div>
      <div class="emergency-banner-text">
        <h2>In case of emergency</h2>
        <p>Call the AKU main emergency line immediately</p>
      </div>
      <a class="emergency-number" id="emergencyNumberLink" href="#">📞 Loading…</a>
    </div>

    <!-- Search -->
    <div style="margin-bottom:16px;">
      <input type="text" id="contactSearch" placeholder="🔍 Search contacts, departments…"
        oninput="searchContacts(this.value)"
        style="width:100%;padding:10px 16px;border:1px solid var(--border);border-radius:10px;
        font-family:'Poppins',sans-serif;font-size:14px;background:white;
        box-shadow:var(--shadow);outline:none;" />
    </div>

    <!-- Campus Filter -->
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterCampus('',this)">All Campuses</button>
      <button class="filter-chip" onclick="filterCampus('Karachi',this)">Karachi</button>
      <button class="filter-chip" onclick="filterCampus('Nairobi',this)">Nairobi</button>
      <button class="filter-chip" onclick="filterCampus('Kampala',this)">Kampala</button>
      <button class="filter-chip" onclick="filterCampus('Dar es Salaam',this)">Dar es Salaam</button>
    </div>

    <div id="contactsContainer"></div>
  </main>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="bottom-nav-item"><span>📅</span><span>Events</span></a>
    <a href="clubs.html" class="bottom-nav-item"><span>🎭</span><span>Clubs</span></a>
    <a href="acc.html" class="bottom-nav-item"><span>🎨</span><span>ACC</span></a>
    <a href="news.html" class="bottom-nav-item"><span>📰</span><span>News</span></a>
    <a href="resources.html" class="bottom-nav-item"><span>🔗</span><span>Resources</span></a>
    <a href="emergency-contacts.html" class="bottom-nav-item active"><span>🚨</span><span>Emergency</span></a>
  </div>
</nav>

<script>
const sb = supabase.createClient("https://dgzuqvffnbfybngoadse.supabase.co","sb_publishable_77t5gCD7M620CzcMwESN-A_oAuqz6B8");
const CATEGORY_COLORS = { "Medical":{bg:"#fef2f2",icon:"🏥",color:"#dc2626"},"Security":{bg:"#fffbeb",icon:"🛡️",color:"#d97706"},"Counselling":{bg:"#f0fdf4",icon:"💚",color:"#16a34a"},"Admin":{bg:"#eff6ff",icon:"🏛️",color:"#2563eb"},"IT Support":{bg:"#f5f3ff",icon:"💻",color:"#7c3aed"},"Facilities":{bg:"#fef9c3",icon:"🔧",color:"#ca8a04"},"Office of Student Experience Pakistan":{bg:"#fdf4ff",icon:"🎓",color:"#a21caf"} };
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
let allContacts=[], activeCampus="", activeSearch="";

function applyContactFilters(){
  let filtered = allContacts;
  if(activeCampus) filtered = filtered.filter(c => !c.campus || c.campus === activeCampus);
  if(activeSearch)  filtered = filtered.filter(c =>
    (c.name||"").toLowerCase().includes(activeSearch) ||
    (c.role||"").toLowerCase().includes(activeSearch) ||
    (c.department||"").toLowerCase().includes(activeSearch) ||
    (c.category||"").toLowerCase().includes(activeSearch) ||
    (c.phone||"").includes(activeSearch)
  );
  render(filtered);
}

function searchContacts(q){
  activeSearch = q.toLowerCase();
  applyContactFilters();
}

async function init(){
  // Load emergency number from settings
  const { data: settings } = await sb.from("site_settings").select("value").eq("key","emergency_number").single();
  const num = settings?.value || "";
  const link = document.getElementById("emergencyNumberLink");
  if(num){
    const parts = num.split(":");
    if(parts.length >= 2){
      const label  = parts[0].trim();
      const number = parts.slice(1).join(":").trim();
      const digits = number.replace(/[^0-9+]/g,"");
      link.innerHTML = `<span style="display:block;font-size:11px;font-weight:600;opacity:.8;margin-bottom:2px;">${label}</span><span style="display:block;font-size:15px;font-weight:800;">📞 ${number}</span>`;
      link.href = digits ? "tel:" + digits : "#";
    } else {
      link.innerHTML = `<span style="font-size:15px;font-weight:800;">📞 ${num}</span>`;
      link.href = "tel:" + num.replace(/[^0-9+]/g,"");
    }
  } else {
    link.textContent = "📞 Contact Admin";
    link.removeAttribute("href");
  }

  const { data } = await sb.from("emergency_contacts").select("*").eq("is_active",true).order("display_order").order("name");
  allContacts = data || [];
  render(allContacts);
}

function filterCampus(campus, btn){
  activeCampus = campus;
  document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active"));
  btn.classList.add("active");
  applyContactFilters();
}

function render(contacts){
  const container = document.getElementById("contactsContainer");
  if(!contacts.length){ container.innerHTML=`<div class="empty"><div style="font-size:48px;margin-bottom:12px;">📋</div><div>No contacts found for this campus.</div></div>`; return; }
  const groups={};
  contacts.forEach(c=>{ const cat=c.category||"General"; if(!groups[cat])groups[cat]=[]; groups[cat].push(c); });
  container.innerHTML = Object.entries(groups).map(([cat,items])=>{
    const style=CATEGORY_COLORS[cat]||{bg:"#f3f4f6",icon:"📞",color:"#374151"};
    return `<div class="category-section">
      <div class="category-label">${style.icon} ${esc(cat)}</div>
      <div class="contacts-grid">${items.map(c=>{
        const call=c.phone?`<a href="tel:${esc(c.phone)}" class="contact-action call"><span>📞</span>${esc(c.phone)}</a>`:"";
        const mail=c.email?`<a href="mailto:${esc(c.email)}" class="contact-action email-btn"><span>✉️</span>Email</a>`:"";
        return `<div class="contact-card">
          <div class="contact-card-top">
            <div class="contact-avatar" style="background:${style.bg};">${style.icon}</div>
            <div>
              <div class="contact-name">${esc(c.name)}</div>
              ${c.role?`<div class="contact-role">${esc(c.role)}</div>`:""}
              ${c.department?`<div class="contact-dept">🏢 ${esc(c.department)}</div>`:""}
              ${c.campus?`<div class="contact-dept">📍 ${esc(c.campus)}</div>`:""}
            </div>
          </div>
          ${call||mail?`<div class="contact-actions">${call}${mail}</div>`:""}
        </div>`;
      }).join("")}</div>
    </div>`;
  }).join("");
}
init();
</script>
</body>
</html>
