<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Life — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%);
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(37,99,235,.12);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 10px; }
    p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    a  {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Connect to the internet to see the latest events, clubs and news at AKU.</p>
    <a href="index.html" onclick="location.reload()">Try Again</a>
  </div>
</body>
</html>
