<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Campus Life" />
  <link rel="apple-touch-icon" href="https://studentexperience.github.io/Student-Events/icon-192.png" />
  <title>Campus Life · Forms</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f3f4f6;
      --panel: #ffffff;
      --shadow: 0 6px 14px rgba(0,0,0,.10);
      --accent: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    /* ── Topbar ── */
    .topbar {
      height: 56px;
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 60%, #3b82f6 100%);
      border-bottom: none; box-shadow: 0 2px 12px rgba(37,99,235,.25);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand { color: white; font-size: 17px; font-weight: 700; letter-spacing: .2px; }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 22px;
      color: white;
    }

    /* ── Shell ── */
    .shell {
      display: grid;
      grid-template-columns: 180px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* ── Left nav ── */
    .nav {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 14px 10px;
    }
    .nav a {
      display: block;
      padding: 10px 12px;
      margin: 4px 0;
      border-radius: 10px;
      color: #111;
      text-decoration: none;
      font-size: 14px;
    }
    .nav a:hover { background: #f3f4f6; }
    .nav a.active {
      background: #eef2ff;
      color: #1f2a64;
      font-weight: 600;
    }

    /* ── Content ── */
    .content { padding: 28px; }

    /* ── Page header ── */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      align-items: center;
    }
    .filter-bar input {
      flex: 1;
      min-width: 200px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      outline: none;
    }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar select {
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      outline: none;
      cursor: pointer;
    }

    /* ── Category pills ── */
    .cat-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .cat-pill {
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      transition: all .15s;
      font-family: 'Poppins', sans-serif;
    }
    .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Result count ── */
    .result-count {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Forms grid ── */
    .forms-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* ── Form card ── */
    .form-card {
      background: var(--panel);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      transition: transform .18s, box-shadow .18s, border-color .18s;
      text-decoration: none;
      color: inherit;
    }
    .form-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,.13);
      border-color: var(--accent);
    }
    .form-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .form-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .form-arrow {
      font-size: 18px;
      color: var(--muted);
      transition: color .15s, transform .15s;
      margin-top: 4px;
    }
    .form-card:hover .form-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }
    .form-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
    }
    .form-description {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .form-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .form-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .form-badge.category { background: #eff6ff; color: #1d4ed8; }
    .form-badge.campus   { background: #f0fdf4; color: #15803d; }
    .form-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      width: fit-content;
      transition: background .15s;
    }
    .form-open-btn:hover { background: #1d4ed8; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .forms-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 1024px) {
      .shell { grid-template-columns: 1fr; }
      .nav {
        display: none;
        position: fixed;
        top: 56px; left: 0;
        width: 200px;
        height: calc(100vh - 56px);
        z-index: 200;
        box-shadow: 4px 0 16px rgba(0,0,0,.12);
        overflow-y: auto;
      }
      .nav.open { display: block; }
      .nav-toggle { display: block; }
      .content { padding: 18px; }
    }
    @media (max-width: 640px) {
      .forms-grid { grid-template-columns: 1fr; }
      .content { padding: 14px; }
      .page-title { font-size: 22px; }
    }

    /* ── CAMPUS LIFE BRAND TOPBAR ── */
    .topbar {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 60%, #3b82f6 100%);
      border-bottom: none;
      box-shadow: 0 2px 12px rgba(37,99,235,.25);
    }
    .brand {
      color: white;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .3px;
    }
    .brand span { opacity: .75; font-weight: 400; }
    .nav-toggle { color: white !important; }

    /* ── CONSISTENT NAV ── */
    @media (min-width: 1025px) {
      .shell { grid-template-columns: 160px 1fr; }
    }
    .nav { padding: 16px 8px !important; width: 160px; }
    .nav a {
      font-size: 13px !important;
      padding: 9px 12px !important;
      margin: 2px 0 !important;
      border-radius: 10px !important;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav a.active {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
      font-weight: 700 !important;
      border-left: 3px solid #2563eb;
      padding-left: 9px !important;
    }
    .nav a:hover:not(.active) { background: #f9fafb !important; }

    /* ── SKELETON LOADER ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
    }

    /* ── CARD FADE-IN ── */
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: cardFadeIn .3s ease forwards; }

    /* ── TABLE ROW HOVER ── */
    table tbody tr:hover { background: #f9fafb; cursor: pointer; }

    /* ── MOBILE BOTTOM NAV ── */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 200;
      box-shadow: 0 -4px 12px rgba(0,0,0,.08);
    }
    .bottom-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #9ca3af;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color .15s;
      min-width: 56px;
    }
    .bottom-nav-item.active { color: #2563eb; }
    .bottom-nav-item span:first-child { font-size: 20px; }
    @media (max-width: 768px) {
      .bottom-nav { display: block; }
      body { padding-bottom: 70px; }
    }

  </style>
</head>
<body>

<header class="topbar">
  <button class="nav-toggle" id="navToggle" aria-label="Menu">&#9776;</button>
  <div class="brand">Campus Life</div>
</header>

<div class="shell">
  <nav class="nav" id="sideNav">
    <a href="index.html">Home</a>
    <a href="index.html">Events</a>
    <a href="clubs.html">Clubs</a>
      <a href="acc.html">ACC</a>
    <a href="news.html">News</a>
    <a href="forms.html" class="active">Forms</a>
  
      <a href="event-hub.html" style="color:#7c3aed;font-weight:700;">✦ Event Hub</a>
    </nav>

  <main class="content">
    <div class="page-title">Forms &amp; Links</div>
    <div class="page-sub">Important forms, applications and resources for AKU students</div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <input id="searchInput" type="text" placeholder="🔍  Search forms…" />
      <select id="campusSelect">
        <option value="">All Campuses</option>
        <option value="Karachi">Karachi</option>
        <option value="Nairobi">Nairobi</option>
        <option value="Kampala">Kampala</option>
        <option value="Dar es Salaam">Dar es Salaam</option>
      </select>
    </div>

    <!-- Category pills — populated dynamically -->
    <div class="cat-pills" id="catPills">
      <button class="cat-pill active" data-cat="">All</button>
    </div>

    <!-- Result count -->
    <div class="result-count" id="resultCount"></div>

    <!-- Forms grid -->
    <div class="forms-grid" id="formsGrid">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="empty-text">Loading forms…</div>
      </div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = "https://dgzuqvffnbfybngoadse.supabase.co";
const SUPABASE_KEY = "sb_publishable_77t5gCD7M620CzcMwESN-A_oAuqz6B8";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { storageKey: "aku-public-session", persistSession: false } });

/* ── Nav toggle ── */
const navToggle = document.getElementById("navToggle");
const sideNav   = document.getElementById("sideNav");
navToggle.addEventListener("click", () => sideNav.classList.toggle("open"));
document.addEventListener("click", e => {
  if(sideNav.classList.contains("open") && !sideNav.contains(e.target) && e.target !== navToggle)
    sideNav.classList.remove("open");
});

/* ── State ── */
let allForms      = [];
let activeCategory = "";
let activeCampus   = "";
let searchQuery    = "";

function esc(str){
  return String(str ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;");
}

/* ── Load ── */
async function loadForms(){
  const { data, error } = await sb
    .from("forms")
    .select("*")
    .eq("active", true)
    .order("category")
    .order("title");

  if(error){
    document.getElementById("formsGrid").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Failed to load forms. Please try again later.</div>
      </div>`;
    return;
  }

  allForms = data || [];

  // Build dynamic category pills from data
  const cats = [...new Set(allForms.map(f => f.category).filter(Boolean))].sort();
  const pillsEl = document.getElementById("catPills");
  pillsEl.innerHTML = `<button class="cat-pill active" data-cat="">All</button>` +
    cats.map(c => `<button class="cat-pill" data-cat="${esc(c)}">${esc(c)}</button>`).join("");

  // Re-attach pill listeners
  pillsEl.querySelectorAll(".cat-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      pillsEl.querySelectorAll(".cat-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      activeCategory = pill.dataset.cat;
      render();
    });
  });

  render();
}

/* ── Render ── */
function render(){
  const q    = searchQuery.toLowerCase();
  const cat  = activeCategory;
  const camp = activeCampus;

  let list = allForms
    .filter(f => !cat  || f.category === cat)
    .filter(f => !camp || f.campus === camp || f.campus === "All")
    .filter(f => !q    || `${f.title} ${f.description} ${f.category} ${f.campus}`.toLowerCase().includes(q));

  document.getElementById("resultCount").textContent =
    list.length ? `Showing ${list.length} form${list.length !== 1 ? "s" : ""}` : "";

  const grid = document.getElementById("formsGrid");

  if(!list.length){
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">No forms found.</div>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(f => `
    <div class="form-card" onclick="openForm('${esc(f.form_url)}')">
      <div class="form-card-top">
        <div class="form-title">${esc(f.title)}</div>
        <div class="form-arrow">→</div>
      </div>
      ${f.description ? `<div class="form-description">${esc(f.description)}</div>` : ""}
      <div class="form-meta">
        ${f.category ? `<span class="form-badge category">${esc(f.category)}</span>` : ""}
        ${f.campus && f.campus !== "All" ? `<span class="form-badge campus">${esc(f.campus)}</span>` : ""}
      </div>
      <a class="form-open-btn" href="${esc(f.form_url)}" target="_blank" onclick="event.stopPropagation()">
        Open Form ↗
      </a>
    </div>
  `).join("");
}

function openForm(url){
  if(url) window.open(url, "_blank");
}

/* ── Filter wiring ── */
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  render();
});

document.getElementById("campusSelect").addEventListener("change", e => {
  activeCampus = e.target.value;
  render();
});

/* ── Init ── */
loadForms();
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(reg => console.log("[PWA] Service worker registered:", reg.scope))
      .catch(err => console.warn("[PWA] Service worker failed:", err));
  });
}
</script>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="bottom-nav-item "><span>📅</span><span>Events</span></a>
    <a href="clubs.html" class="bottom-nav-item "><span>🎭</span><span>Clubs</span></a>
    <a href="acc.html" class="bottom-nav-item "><span>🎨</span><span>ACC</span></a>
    <a href="news.html" class="bottom-nav-item "><span>📰</span><span>News</span></a>
    <a href="forms.html" class="bottom-nav-item active"><span>📋</span><span>Forms</span></a>
  </div>
</nav>
</body>
</html>
